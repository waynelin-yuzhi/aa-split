<script>
"use strict";

/* =========================================================================
 * 設定：填入你的 LIFF ID（LINE Developers → LIFF）。留空也能在瀏覽器使用。
 * ========================================================================= */
const LIFF_ID = "2010401423-LXxOHE2H";

/* Supabase 後端（publishable key 是公開金鑰、可放前端；隱私靠 RLS 全鎖 + RPC） */
const SUPABASE_URL = "https://ytlakkxrbookftluulbo.supabase.co";
const SUPABASE_KEY = "sb_publishable_WMQUMN8bIlHTwwR95bLueA_VUOI_Drd";

/* =========================================================================
 * 計算引擎 —— 忠實移植自 aa-split skill 的 aa.py
 *   淨值法（已付 − 應付）→ 最少轉帳配對 → 六道驗算
 *   差異：零頭採整數淨值法（殘差由最大收款人吸收），轉帳保證對帳歸零。
 * ========================================================================= */
// 一筆項目的有效金額（指定金額模式 = 各人金額加總，其餘 = 金額欄）
function effectiveItemAmount(it){
  const sharers = (it.sharerIds || []);
  if(it.split && it.split.mode === 'amount'){
    return sharers.reduce((s,id)=> s + (Number(it.split.values?.[id]) || 0), 0);
  }
  return Number(it.amount) || 0;
}
function itemsTotal(items){
  return (items || []).reduce((s,it)=>{
    const amt = effectiveItemAmount(it);
    return s + ((amt>0 && (it.sharerIds||[]).length>0) ? amt : 0);
  }, 0);
}
// 整單調整層：服務費/折扣，按消費比例分攤。sign +1 加價 / -1 折扣
function adjustTotal(subtotal, adjustments){
  return (adjustments || []).reduce((s,a)=>{
    const amt = a.kind==='pct' ? subtotal*(Number(a.value)||0)/100 : (Number(a.value)||0);
    return s + amt*(a.sign||1);
  }, 0);
}
function grandTotal(items, adjustments){
  const sub = itemsTotal(items);
  return sub + adjustTotal(sub, adjustments);
}

function computeSplit(members, items, adjustments){
  const ids = members.map(m => m.id);
  const nameOf = Object.fromEntries(members.map(m => [m.id, m.name]));

  const owe  = Object.fromEntries(ids.map(id => [id, 0]));
  const paid = Object.fromEntries(ids.map(id => [id, 0]));
  let total = 0;

  // 每筆支出：分攤名單 + 分法（均分/份數/指定金額）決定 owe；付款人決定 paid
  for(const it of items){
    const sharers = (it.sharerIds || []).filter(id => id in owe);
    if(sharers.length === 0) continue;
    const mode = (it.split && it.split.mode) || 'equal';
    const amt = Number(it.amount) || 0;
    let itemAmt = 0;
    if(mode === 'amount'){
      const vals = sharers.map(s => Number(it.split.values?.[s]) || 0);
      itemAmt = vals.reduce((a,b)=>a+b, 0);
      if(itemAmt <= 0) continue;
      sharers.forEach((s,k)=> owe[s] += vals[k]);
    } else if(mode === 'shares'){
      if(amt <= 0) continue; itemAmt = amt;
      let tot = 0; for(const s of sharers) tot += (Number(it.split.values?.[s]) || 1);
      if(tot <= 0) tot = sharers.length;
      for(const s of sharers) owe[s] += amt * (Number(it.split.values?.[s]) || 1) / tot;
    } else {
      if(amt <= 0) continue; itemAmt = amt;
      const per = amt / sharers.length;
      for(const s of sharers) owe[s] += per;
    }
    total += itemAmt;
    if(it.payerId && it.payerId in paid) paid[it.payerId] += itemAmt;
  }

  // 整單調整層：服務費/折扣按比例分攤——應付與已付兩側同步 scale，保持守恆
  const subtotal = total;
  const adjustment = adjustTotal(subtotal, adjustments);
  total = subtotal + adjustment;
  if(subtotal > 0 && adjustment !== 0){
    const scale = total / subtotal;
    for(const id of ids){ owe[id] *= scale; paid[id] *= scale; }
  }

  // 淨值 = 已付 − 應付
  const net = Object.fromEntries(ids.map(id => [id, paid[id] - owe[id]]));

  // 整數化淨值，殘差丟給最大收款人（零頭吸收），保證總和 = 0
  const netR = Object.fromEntries(ids.map(id => [id, Math.round(net[id])]));
  let residual = -ids.reduce((s,id) => s + netR[id], 0);
  if(residual !== 0){
    const maxCreditor = ids.slice().sort((a,b) => net[b] - net[a])[0];
    netR[maxCreditor] += residual;
  }

  // 最少轉帳配對（貪婪：最大欠款人 ↔ 最大收款人）
  const creditors = ids.filter(id => netR[id] > 0).map(id => [id, netR[id]]).sort((a,b)=>b[1]-a[1]);
  const debtors   = ids.filter(id => netR[id] < 0).map(id => [id, -netR[id]]).sort((a,b)=>b[1]-a[1]);
  const transfers = [];
  let i=0, j=0;
  while(i < debtors.length && j < creditors.length){
    const pay = Math.min(debtors[i][1], creditors[j][1]);
    if(pay > 0) transfers.push({from:debtors[i][0], to:creditors[j][0], amount:pay});
    debtors[i][1] -= pay; creditors[j][1] -= pay;
    if(debtors[i][1] === 0) i++;
    if(creditors[j][1] === 0) j++;
  }

  // 六道驗算
  const checks = [];
  const paidSum = ids.reduce((s,id)=>s+paid[id],0);
  checks.push({ok: Math.abs(paidSum-total)<0.01, label:`實付總額 = 消費總額`});
  const oweSum = ids.reduce((s,id)=>s+owe[id],0);
  checks.push({ok: Math.abs(oweSum-total)<0.01, label:`應付總和 = 總額`});
  checks.push({ok: Math.abs(ids.reduce((s,id)=>s+net[id],0))<0.01, label:`淨值總和 = 0`});
  const payers = new Set(transfers.map(t=>t.from)), receivers = new Set(transfers.map(t=>t.to));
  let dirOk = true;
  for(const id of ids){
    if(netR[id] > 0 && payers.has(id)) dirOk = false;
    if(netR[id] < 0 && receivers.has(id)) dirOk = false;
  }
  checks.push({ok:dirOk, label:`金流方向正確（正者收、負者付）`});
  const out = Object.fromEntries(ids.map(id=>[id,0])), inc = Object.fromEntries(ids.map(id=>[id,0]));
  for(const t of transfers){ out[t.from]+=t.amount; inc[t.to]+=t.amount; }
  let reconOk = true;
  for(const id of ids){ if(Math.abs((out[id]-inc[id]) - (-netR[id])) > 1.01) reconOk = false; }
  checks.push({ok:reconOk, label:`逐人對帳吻合`});
  checks.push({ok: transfers.length <= Math.max(0, ids.length-1), label:`轉帳筆數 ≤ 人數−1`});
  const allOk = checks.every(c=>c.ok);

  return {members, nameOf, total, subtotal, adjustment, adjustments: adjustments||[], owe, paid, net, netR, transfers, checks, allOk};
}

/* =========================================================================
 * 雲端後端（Supabase）+ 儲存層
 *   - 每場聚會存 Supabase，用「不可猜 id + share_token」當連結鑰匙（capability）
 *   - 本機只存一份索引（aa_index_v1）給列表用，完整資料即時從雲端讀
 *   - 沒設定金鑰時自動退回 localStorage（純本機）
 * ========================================================================= */
const sb = (SUPABASE_URL && SUPABASE_KEY && window.supabase)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
const CLOUD = !!sb;

async function rpc(name, args){
  const { data, error } = await sb.rpc(name, args);
  if(error) throw error;
  return Array.isArray(data) ? data[0] : data;
}
// 雲端 row ↔ app 物件（members↔participants、date↔event_date）
function rowToGathering(row, token){
  return {
    id: row.id, shareToken: row.share_token || token,
    title: row.title || "", date: row.event_date || "",
    currency: row.currency || "TWD", status: row.status || "open",
    members: row.participants || [], items: row.items || [],
    adjustments: row.adjustments || [], settlements: row.settlements || []
  };
}

// g_list 回 setof（多列）；其餘 RPC 回單列
async function rpcRows(name, args){
  const { data, error } = await sb.rpc(name, args);
  if(error) throw error;
  return Array.isArray(data) ? data : (data ? [data] : []);
}

// 身分制：所有操作帶 ACCESS_TOKEN，後端用它驗證 LINE 身分
const Store = {
  async list(){   // 我有份的聚會（owner 或成員），跟身分跑
    const rows = await rpcRows("g_list", { p_access_token: ACCESS_TOKEN });
    return rows.map(r => ({
      id: r.id, title: r.title, date: r.event_date,
      n: (r.participants||[]).length, count: (r.items||[]).length,
      total: grandTotal(r.items, r.adjustments), updatedAt: r.updated_at
    }));
  },
  async create(g){
    const row = await rpc("g_create", { p_access_token: ACCESS_TOKEN, p_title:g.title||null,
      p_event_date:g.date||null, p_currency:g.currency||"TWD", p_my_name: MY_NAME||"我", p_my_member_id: uid() });
    return rowToGathering(row);
  },
  async save(g){
    const row = await rpc("g_save", { p_id:g.id, p_access_token: ACCESS_TOKEN, p_title:g.title||null,
      p_event_date:g.date||null, p_currency:g.currency||"TWD", p_status:g.status||"open",
      p_participants:g.members||[], p_items:g.items||[], p_adjustments:g.adjustments||[], p_settlements:g.settlements||[] });
    return rowToGathering(row);
  },
  async get(id, token){   // 成員可讀；或持邀請 token 可讀（尚未加入）
    const row = await rpc("g_get", { p_id:id, p_token: token||null, p_access_token: ACCESS_TOKEN });
    return row ? rowToGathering(row, token) : null;
  },
  async join(id, token){  // 邀請流程：把我加進去
    const row = await rpc("g_join", { p_id:id, p_token:token, p_access_token: ACCESS_TOKEN,
      p_my_name: MY_NAME||"我", p_my_member_id: uid() });
    return rowToGathering(row, token);
  },
  async remove(id){ await rpc("g_delete", { p_id:id, p_access_token: ACCESS_TOKEN }); }
};

/* =========================================================================
 * App 狀態 & 工具
 * ========================================================================= */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const $ = sel => document.querySelector(sel);
const esc = s => String(s??"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money = n => "$" + Math.round(n).toLocaleString("en-US");
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };

let liffReady = false, inLineClient = false;
let ACCESS_TOKEN = null, MY_UID = null, MY_NAME = null;   // 身分（LINE 登入後填）
let view = "list";          // list | edit | result
let current = null;         // 編輯中的聚會
let editDraftItem = null;   // 正在新增/編輯的項目
let editDraftAdj = null;     // 正在新增/編輯的服務費/折扣

// 認自己：優先用我的 LINE uid 對應的成員；否則用本機手動選的
function getMe(){
  if(!current || !current.members) return null;
  const byUid = MY_UID && current.members.find(m=>m.uid===MY_UID);
  if(byUid) return byUid.id;
  return current.id ? localStorage.getItem("aa_me_"+current.id) : null;
}
function setMe(pid){ if(current && current.id) localStorage.setItem("aa_me_"+current.id, pid); }

let _persistTimer = null;
function debouncedPersist(){ clearTimeout(_persistTimer); _persistTimer = setTimeout(()=>persistCurrent(), 500); }
async function finishEdit(){ await persistCurrent(); toast("已儲存"); renderList(); }

function itemRowHTML(it){

let _saveChain = Promise.resolve();
function persistCurrent(){
  if($("#gTitle")) current.title = $("#gTitle").value.trim();
  if($("#gDate"))  current.date  = $("#gDate").value;
  // 序列化儲存（避免連續編輯時 race），UI 樂觀先渲染、存在背景進行
  _saveChain = _saveChain.then(()=>Store.save(current)).then(()=>broadcastChanged(current.id)).catch(e=>{ console.error(e); toast("雲端儲存失敗"); });
  return _saveChain;
}

/* ---- 即時同步：每場聚會一個 Realtime 廣播頻道，存檔後 ping，其他人收到就拉最新 ---- */
let rtChannel = null, rtGid = null, _syncPendingId = null;
function subscribeRealtime(id){
  if(!CLOUD || !id) return;
  if(rtChannel && rtGid === id) return;      // 已訂閱同一場
  unsubscribeRealtime();
  rtGid = id;
  rtChannel = sb.channel("g:" + id);
  rtChannel.on("broadcast", { event: "changed" }, () => onRemoteChange(id)).subscribe();
}
function unsubscribeRealtime(){
  if(rtChannel){ try{ sb.removeChannel(rtChannel); }catch(e){} }
  rtChannel = null; rtGid = null;
}
function broadcastChanged(id){
  if(rtChannel && rtGid === id){
    try{ rtChannel.send({ type:"broadcast", event:"changed", payload:{ at: Date.now() } }); }catch(e){}
  }
}
async function onRemoteChange(id){
  if(!current || current.id !== id) return;
  // 在編輯主畫面、沒開子表單 → 直接拉最新套用；否則顯示橫幅讓使用者自己點（不打斷他輸入）
  if(view === "edit" && !editDraftItem && !editDraftAdj){
    try{ const fresh = await Store.get(id, current.shareToken); if(fresh){ current = fresh; renderEdit(false); toast("已同步最新"); } }catch(e){}
  } else {
    showSyncBanner(id);
  }
}
function showSyncBanner(id){ _syncPendingId = id; $("#syncbar").classList.add("show"); }
function hideSyncBanner(){ _syncPendingId = null; $("#syncbar").classList.remove("show"); }
async function applySync(){
  const id = _syncPendingId; hideSyncBanner();
  if(!id || !current || current.id !== id) return;
  try{
    const fresh = await Store.get(id, current.shareToken);
    if(fresh){ current = fresh; editDraftItem = null; editDraftAdj = null; (view==="result") ? renderResult() : renderEdit(false); }
  }catch(e){ console.error(e); }
}
function shareInvite(){
  if(!current.shareToken){ toast("聚會還沒建立好"); return; }
  // 用 LIFF 網址 + query，讓對方在 LINE 內開啟並登入；hash 在登入轉址會掉
  const link = `https://liff.line.me/${LIFF_ID}?g=${current.id}&t=${current.shareToken}`;
  const name = current.title || "未命名聚會";
  const txt = `欸，算一下！— 分帳一鍵算清\n「${name}」邀你一起分帳，點開就能加入 👉\n${link}`;
  if(liffReady && inLineClient && liff.isApiAvailable && liff.isApiAvailable("shareTargetPicker")){
    liff.shareTargetPicker([{type:"text", text:txt}]).then(()=>toast("已開啟分享")).catch(()=>toast("分享取消"));
  } else if(navigator.share){
    navigator.share({title:"欸，算一下！", text:txt}).catch(()=>{});
  } else if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(link).then(()=>toast("已複製邀請連結，貼給朋友")).catch(()=>fallbackCopy(link));
  } else fallbackCopy(link);
}

function addMember(){
  const inp = $("#memberInput");
  const name = inp.value.trim();
  if(!name) return;
  if(current.members.some(p=>p.name===name)){ toast("已經有這個名字了"); inp.value=""; return; }
  current.members.push({id:uid(), name});
  persistCurrent();
  renderEdit(false);
  $("#memberInput").focus();
}
function renameMember(id, ev){
  ev.stopPropagation();
  const p = current.members.find(m=>m.id===id); if(!p) return;
  const name = prompt("改名字", p.name);
  if(name===null) return;
  const t = name.trim(); if(!t) return;
  if(current.members.some(m=>m.id!==id && m.name===t)){ toast("已經有這個名字了"); return; }
  p.name = t; persistCurrent(); renderEdit(false);
}
function removeMember(id, ev){
  ev.stopPropagation();
  const p = current.members.find(m=>m.id===id);
  if(!confirm(`移除成員「${p?p.name:""}」？他分攤或付款的項目會一併調整。`)) return;
  current.members = current.members.filter(p=>p.id!==id);
  current.items.forEach(it=>{
    if(it.payerId===id) it.payerId=null;
    it.sharerIds = (it.sharerIds||[]).filter(s=>s!==id);
  });
  persistCurrent();
  renderEdit(false);
}
async function deleteGathering(){
  if(!confirm("確定刪除這場聚會？無法復原。")) return;
  try{ await Store.remove(current.id); }
  catch(e){ console.error(e); toast("刪除失敗"); return; }
  renderList();
}

/* ---- 新增 / 編輯項目（簡易表單覆蓋在 list 上方） ---- */
function startAddItem(){
  // 付款人沿用上一筆（一人付全額時設一次就好），否則預設第一位成員
  const lastPayer = current.items.length ? current.items[current.items.length-1].payerId : null;
  const myId = getMe();
  const valid = id => current.members.some(m=>m.id===id);
  editDraftItem = { id:uid(), name:"", amount:"",
                    payerId: (valid(myId) && myId) || lastPayer || current.members[0]?.id || null,
                    sharerIds: current.members.map(m=>m.id),
                    split: { mode:"equal", values:{} }, _isNew:true };
  renderItemForm();
}
function startEditItem(id){
  const it = current.items.find(x=>x.id===id);
  if(!it) return;
  editDraftItem = JSON.parse(JSON.stringify(it));
  renderItemForm();
}
function renderItemForm(){
  const d = editDraftItem, m = current.members;
  const sp = d.split || (d.split = { mode:"equal", values:{} });
  if(!sp.values) sp.values = {};
  const mode = sp.mode || "equal";
  const allOn = d.sharerIds.length === m.length;
  const sel = m.filter(p=>d.sharerIds.includes(p.id));
  const amountSum = sel.reduce((s,p)=> s + (Number(sp.values[p.id])||0), 0);
  $("#main").innerHTML = `
    <div class="card">
      <div class="sect-title">${d._isNew?"新增項目":"編輯項目"}</div>
      <label class="fld"><span>品名</span>
        <input id="itName" placeholder="例如：海鮮鍋、啤酒、Uber" value="${esc(d.name)}"></label>
      ${mode!=='amount'
        ? `<label class="fld"><span>金額</span>
            <input id="itAmt" type="number" inputmode="decimal" placeholder="0" value="${esc(d.amount)}"></label>`
        : `<div class="fld"><span style="display:block;font-size:13px;color:var(--muted);margin-bottom:6px;">金額（各人加總）</span>
            <div class="num" style="font-size:19px;font-weight:700;">${money(amountSum)}</div></div>`}
      <label class="fld"><span>誰付的錢</span>
        <select id="itPayer">
          ${m.map(p=>`<option value="${p.id}" ${p.id===d.payerId?"selected":""}>${esc(p.name)}</option>`).join("")}
        </select></label>
      <div class="sect-title" style="margin-top:4px;">誰分攤這筆</div>
      <div class="hint">點名字切換</div>
      <div class="chips">
        <span class="chip ${allOn?'on':''}" onclick="toggleAllSharers()">全員</span>
        ${m.map(p=>`<span class="chip ${d.sharerIds.includes(p.id)?'on':''}" onclick="toggleSharer('${p.id}')">${esc(p.name)}</span>`).join("")}
      </div>
      <div class="sect-title" style="margin-top:14px;">分法</div>
      <div class="chips">
        <span class="chip ${mode==='equal'?'on':''}" onclick="setSplitMode('equal')">均分</span>
        <span class="chip ${mode==='shares'?'on':''}" onclick="setSplitMode('shares')">按份數</span>
        <span class="chip ${mode==='amount'?'on':''}" onclick="setSplitMode('amount')">指定金額</span>
      </div>
      ${mode!=='equal' && sel.length ? `<div class="spacer"></div>
        <div class="hint">${mode==='shares'?'各填份數，多吃的人填多份（按比例分攤金額）':'各填確切金額，總額自動加總'}</div>
        ${sel.map(p=>`<div class="row" style="align-items:center;gap:10px;margin-bottom:8px;">
          <span style="flex:1;">${esc(p.name)}</span>
          <input class="splitval" data-mid="${p.id}" type="number" inputmode="decimal" style="flex:0 0 120px;" placeholder="${mode==='shares'?'1 份':'0'}" value="${esc(sp.values[p.id]??'')}">
        </div>`).join("")}` : ''}
    </div>
    <div class="row">
      <button class="btn ghost" onclick="renderEdit(false)">取消</button>
      <button class="btn" onclick="saveItem()">儲存項目</button>
    </div>
    ${d._isNew?'':'<div class="spacer"></div><button class="btn danger block" onclick="deleteItem()">刪除這筆</button>'}
  `;
  syncDraftInputs();
}
function syncDraftInputs(){
  // 讓表單輸入即時回寫到 draft（切換 chip 重繪時不丟失）
  const n=$("#itName"), a=$("#itAmt"), p=$("#itPayer");
  if(n) n.oninput = ()=> editDraftItem.name = n.value;
  if(a) a.oninput = ()=> editDraftItem.amount = a.value;
  if(p) p.onchange = ()=> editDraftItem.payerId = p.value;
  document.querySelectorAll('.splitval').forEach(inp=>{
    inp.oninput = ()=>{ editDraftItem.split.values[inp.dataset.mid] = inp.value; };
  });
}
function setSplitMode(mode){
  const sp = editDraftItem.split || (editDraftItem.split = {mode:"equal", values:{}});
  sp.mode = mode;
  if(mode==='shares') editDraftItem.sharerIds.forEach(id=>{ if(sp.values[id]===undefined || sp.values[id]==="") sp.values[id]=1; });
  renderItemForm();
}
function toggleSharer(id){
  const arr = editDraftItem.sharerIds;
  const i = arr.indexOf(id);
  if(i>=0) arr.splice(i,1); else arr.push(id);
  renderItemForm();
}
function toggleAllSharers(){
  const all = current.members.map(m=>m.id);
  editDraftItem.sharerIds = (editDraftItem.sharerIds.length===all.length) ? [] : all;
  renderItemForm();
}
function saveItem(){
  const d = editDraftItem;
  d.name = ($("#itName").value||"").trim() || "未命名";
  d.payerId = $("#itPayer").value;
  if(d.sharerIds.length===0){ toast("至少要有一個人分攤"); return; }
  const mode = (d.split && d.split.mode) || 'equal';
  if(mode==='amount'){
    const sum = d.sharerIds.reduce((s,id)=> s + (Number(d.split.values?.[id])||0), 0);
    if(sum<=0){ toast("指定金額至少要有一筆大於 0"); return; }
    d.amount = sum;
  } else {
    d.amount = Number($("#itAmt").value)||0;
    if(d.amount<=0){ toast("金額要大於 0"); return; }
    if(mode==='shares' && d.sharerIds.reduce((s,id)=>s+(Number(d.split.values?.[id])||1),0)<=0){ toast("份數要大於 0"); return; }
  }
  if(d.split && d.split.values) Object.keys(d.split.values).forEach(k=>{ if(!d.sharerIds.includes(k)) delete d.split.values[k]; });
  const isNew = d._isNew; delete d._isNew;
  const i = current.items.findIndex(x=>x.id===d.id);
  if(i>=0) current.items[i]=d; else current.items.push(d);
  editDraftItem=null;
  persistCurrent();
  renderEdit(false);
}
function deleteItem(){
  if(!confirm(`確定刪除「${editDraftItem.name||"這筆"}」？`)) return;
  current.items = current.items.filter(x=>x.id!==editDraftItem.id);
  editDraftItem=null;
  persistCurrent();
  renderEdit(false);
}

function cancelDraft(){ editDraftItem=null; editDraftAdj=null; renderEdit(false); }

/* ---- 整單調整層：服務費 / 折扣 ---- */
function adjRowHTML(a, sub){
  const amt = a.kind==='pct' ? sub*(Number(a.value)||0)/100 : (Number(a.value)||0);
  const signed = (a.sign||1) * amt;
  const desc = a.kind==='pct' ? `${a.sign<0?'−':'+'}${a.value}%` : `${a.sign<0?'−':'+'}${money(Math.abs(a.value))}`;
  return `<div class="itemrow" onclick="startEditAdj('${a.id}')">
    <div class="info"><div class="nm">${esc(a.name||'調整')}</div><div class="sub">${desc}</div></div>
    <div class="price num" style="color:${a.sign<0?'var(--get)':'var(--ink)'}">${signed<0?'−':'+'}${money(Math.abs(signed))}</div>
    <div class="faint">›</div>
  </div>`;
}
function quickServiceCharge(){
  current.adjustments = current.adjustments || [];
  if(current.adjustments.some(a=>a.name==='服務費')){ toast('已經有服務費了'); return; }
  current.adjustments.push({id:uid(), name:'服務費', kind:'pct', value:10, sign:1});
  persistCurrent(); renderEdit(false);
}
function startAddAdj(){ editDraftAdj = {id:uid(), name:'', kind:'pct', value:'', sign:1, _isNew:true}; renderAdjForm(); }
function startEditAdj(id){
  const a = (current.adjustments||[]).find(x=>x.id===id);
  if(!a) return;
  editDraftAdj = JSON.parse(JSON.stringify(a));
  renderAdjForm();
}
function setAdjSign(s){ editDraftAdj.sign=s; renderAdjForm(); }
function setAdjKind(k){ editDraftAdj.kind=k; renderAdjForm(); }
function renderAdjForm(){
  const d = editDraftAdj;
  $("#main").innerHTML = `
    <div class="card">
      <div class="sect-title">${d._isNew?'新增加價 / 折扣':'編輯'}</div>
      <label class="fld"><span>名稱</span>
        <input id="adjName" placeholder="例如：服務費、折價券" value="${esc(d.name)}"></label>
      <div class="sect-title" style="margin-top:4px;">加還是減</div>
      <div class="chips">
        <span class="chip ${d.sign>=0?'on':''}" onclick="setAdjSign(1)">＋ 加價</span>
        <span class="chip ${d.sign<0?'on':''}" onclick="setAdjSign(-1)">− 折扣</span>
      </div>
      <div class="spacer"></div>
      <div class="sect-title">百分比還是固定金額</div>
      <div class="chips">
        <span class="chip ${d.kind==='pct'?'on':''}" onclick="setAdjKind('pct')">百分比 %</span>
        <span class="chip ${d.kind==='amount'?'on':''}" onclick="setAdjKind('amount')">固定金額</span>
      </div>
      <div class="spacer"></div>
      <label class="fld" style="margin-bottom:0;"><span>${d.kind==='pct'?'百分比（%）':'金額'}</span>
        <input id="adjVal" type="number" inputmode="decimal" placeholder="${d.kind==='pct'?'10':'200'}" value="${esc(d.value)}"></label>
    </div>
    <div class="row">
      <button class="btn ghost" onclick="cancelDraft()">取消</button>
      <button class="btn" onclick="saveAdj()">儲存</button>
    </div>
    ${d._isNew?'':'<div class="spacer"></div><button class="btn danger block" onclick="deleteAdj()">刪除</button>'}
  `;
  const n=$("#adjName"); if(n) n.oninput=()=>editDraftAdj.name=n.value;
  const v=$("#adjVal"); if(v) v.oninput=()=>editDraftAdj.value=v.value;
}
function saveAdj(){
  const d = editDraftAdj;
  d.name = ($("#adjName").value||'').trim() || (d.sign<0?'折扣':'加價');
  d.value = Number($("#adjVal").value)||0;
  if(d.value<=0){ toast('數值要大於 0'); return; }
  const a = {id:d.id, name:d.name, kind:d.kind, value:d.value, sign:d.sign};
  current.adjustments = current.adjustments || [];
  const i = current.adjustments.findIndex(x=>x.id===d.id);
  if(i>=0) current.adjustments[i]=a; else current.adjustments.push(a);
  editDraftAdj=null; persistCurrent(); renderEdit(false);
}
function deleteAdj(){
  if(!confirm(`確定刪除「${editDraftAdj.name||"這筆調整"}」？`)) return;
  current.adjustments = (current.adjustments||[]).filter(x=>x.id!==editDraftAdj.id);
  editDraftAdj=null; persistCurrent(); renderEdit(false);
}

/* =========================================================================
 * 畫面：分帳結果
 * ========================================================================= */
let lastResult = null;
function goResult(){
  persistCurrent();
  if((current.items||[]).length===0){ toast("先新增消費項目"); return; }
  renderResult();
}
function renderResult(){
  view = "result";
  $("#title").textContent = "分帳結果";
  $("#backBtn").classList.remove("hidden");
  $("#brandIcon").classList.add("hidden");
  $("#addGatheringBtn").classList.add("hidden");

  const r = computeSplit(current.members, current.items, current.adjustments);
  lastResult = r;
  const ordered = current.members.slice().sort((a,b)=> r.net[b.id]-r.net[a.id]);

  const peopleRows = ordered.map(p=>{
    const net = r.netR[p.id];
    const cls = net>0?"pos":(net<0?"neg":"");
    const tag = net>0?`+${money(net).slice(1)} 收`:(net<0?`−${money(-net).slice(1)} 付`:"平");
    return `<div class="person">
      <span class="nm">${esc(p.name)}</span>
      <span class="ow num">應付 ${money(r.owe[p.id])}</span>
      <span class="net ${cls} num">${tag}</span>
    </div>`;
  }).join("");

  const settled = new Set(current.settlements||[]);
  const paidCount = r.transfers.filter(t=>settled.has(t.from+">"+t.to)).length;
  const transferRows = r.transfers.length===0
    ? `<div class="faint">大家剛好打平，不用轉帳 🎉</div>`
    : r.transfers.map(t=>{
        const key = t.from+">"+t.to, paid = settled.has(key);
        const toM = current.members.find(m=>m.id===t.to);
        const pay = toM && toM.payInfo && toM.payInfo.trim();
        return `<div class="transfer ${paid?'paid':''}">
        <span class="from">${esc(r.nameOf[t.from])}</span>
        <span class="arr">→</span>
        <span class="to">${esc(r.nameOf[t.to])}</span>
        <span class="v num">${money(t.amount)}</span>
        <button class="paidbtn" onclick="toggleSettle('${t.from}','${t.to}')">${paid?'✓ 已付':'標記已付'}</button>
      </div>
      ${(!paid && pay)?`<div class="payinfo">↳ 轉給 ${esc(r.nameOf[t.to])}：<span class="num">${esc(pay)}</span><button class="copybtn" onclick="copyPay('${t.to}')">複製</button></div>`:''}`;
      }).join("") +
      (r.transfers.length>0?`<div class="settle-prog">結清進度 ${paidCount}/${r.transfers.length}${paidCount===r.transfers.length?' ✅ 全部還清！':''}</div>`:'');

  const verify = r.allOk
    ? `<div class="verify">✓ 六道驗算全部通過</div>`
    : `<div class="verify bad">⚠ 驗算未通過，請檢查輸入</div>`;

  $("#main").innerHTML = `
    <div id="resultCard">
      <div class="rc-head">
        <div>
          <div class="rc-title">${esc(current.title||"未命名聚會")}</div>
          <div class="rc-sub">${esc(current.date||"")} ・ ${current.members.length} 人</div>
        </div>
        <div class="rc-total">總額<b class="num">${money(r.total)}</b></div>
      </div>

      ${r.adjustment ? `<div class="rc-block">
        <div class="h">帳單</div>
        <div class="person"><span class="nm">小計</span><span class="net num">${money(r.subtotal)}</span></div>
        ${r.adjustments.map(a=>{ const amt=a.kind==='pct'?r.subtotal*(Number(a.value)||0)/100:(Number(a.value)||0); const signed=(a.sign||1)*amt; return `<div class="person"><span class="nm muted">${esc(a.name)}${a.kind==='pct'?` (${a.value}%)`:''}</span><span class="net num ${a.sign<0?'pos':''}">${signed<0?'−':'+'}${money(Math.abs(signed))}</span></div>`; }).join("")}
        <div class="person"><span class="nm">總額</span><span class="net num">${money(r.total)}</span></div>
      </div>` : ''}

      <div class="rc-block">
        <div class="h">每人</div>
        ${peopleRows}
      </div>

      <div class="rc-block">
        <div class="h">最少轉帳 ${r.transfers.length>0?`（${r.transfers.length} 筆）`:''}</div>
        ${transferRows}
      </div>
      ${verify}
    </div>

    <div class="actions">
      <button class="btn ghost" onclick="copyText()">複製文字</button>
      <button class="btn line" id="shareBtn" onclick="shareToLine()">分享到 LINE</button>
    </div>
    <div class="spacer"></div>
    <button class="btn ghost block" onclick="renderEdit(false)">← 回去改項目</button>
  `;
  if(!inLineClient){ const b=$("#shareBtn"); b.textContent="系統分享"; }
}

function toggleSettle(from, to){
  const key = from+">"+to;
  current.settlements = current.settlements || [];
  const i = current.settlements.indexOf(key);
  if(i>=0) current.settlements.splice(i,1); else current.settlements.push(key);
  persistCurrent();
  renderResult();
}
function copyPay(memberId){
  const m = current.members.find(x=>x.id===memberId);
  const v = m && m.payInfo && m.payInfo.trim();
  if(!v) return;
  if(navigator.clipboard?.writeText) navigator.clipboard.writeText(v).then(()=>toast("已複製收款資訊")).catch(()=>fallbackCopy(v));
  else fallbackCopy(v);
}
function resultText(){
  const r = lastResult;
  const settled = new Set(current.settlements||[]);
  const ordered = current.members.slice().sort((a,b)=> r.net[b.id]-r.net[a.id]);
  let s = `🧾 ${current.title||"欸，算一下！"}（${current.date||""}）\n`;
  if(r.adjustment){
    let bits = r.adjustments.map(a=>`${a.sign<0?'−':'+'}${a.kind==='pct'?a.value+'%':money(a.value)} ${a.name}`).join("、");
    s += `小計 ${money(r.subtotal)}（${bits}）→ 總額 ${money(r.total)}・${current.members.length} 人\n\n`;
  } else {
    s += `總額 ${money(r.total)}・${current.members.length} 人\n\n`;
  }
  s += `〔每人〕\n`;
  for(const p of ordered){
    const net=r.netR[p.id];
    const tag = net>0?`該收 ${money(net)}`:(net<0?`該付 ${money(-net)}`:"打平");
    s += `・${p.name}：應付 ${money(r.owe[p.id])}（${tag}）\n`;
  }
  s += `\n💸 最少轉帳\n`;
  if(r.transfers.length===0) s += `・大家剛好打平，免轉帳 🎉\n`;
  else for(const t of r.transfers){
    const paid = settled.has(t.from+">"+t.to);
    const toM = current.members.find(m=>m.id===t.to);
    const pay = (!paid && toM && toM.payInfo && toM.payInfo.trim());
    s += `・${r.nameOf[t.from]} → ${r.nameOf[t.to]}：${money(t.amount)}${paid?" ✅已付":""}${pay?`（收款：${toM.payInfo.trim()}）`:""}\n`;
  }
  if(r.allOk) s += `\n✅ 已驗算`;
  return s;
}

function copyText(){
  const txt = resultText();
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast("已複製，可貼到 LINE")).catch(()=>fallbackCopy(txt));
  } else fallbackCopy(txt);
}
function fallbackCopy(txt){
  const ta=document.createElement("textarea"); ta.value=txt; document.body.appendChild(ta);
  ta.select(); try{ document.execCommand("copy"); toast("已複製"); }catch(e){ toast("複製失敗，請手動選取"); }
  document.body.removeChild(ta);
}

function shareToLine(){
  const txt = resultText();
  if(liffReady && inLineClient && liff.isApiAvailable && liff.isApiAvailable("shareTargetPicker")){
    liff.shareTargetPicker([{type:"text", text:txt}])
      .then(()=>toast("已開啟分享"))
      .catch(err=>{ console.error(err); toast("分享取消或失敗"); });
  } else if(navigator.share){
    navigator.share({text:txt}).catch(()=>{});
  } else {
    copyText();
  }
}

/* =========================================================================
 * 返回 / 路由
 * ========================================================================= */
$("#backBtn").addEventListener("click", async ()=>{
  if(view==="result") renderEdit(false);
  else if(view==="edit"){ if(editDraftItem||editDraftAdj){ editDraftItem=null; editDraftAdj=null; renderEdit(false); } else { await persistCurrent(); renderList(); } }
  else renderList();
});
$("#addGatheringBtn").addEventListener("click", newGathering);

/* =========================================================================
 * 邀請加入畫面：持有效連結但還不是成員 → 問要不要加入
 * ========================================================================= */
function showLoginError(msg){
  $("#backBtn").classList.add("hidden"); $("#brandIcon").classList.add("hidden"); $("#addGatheringBtn").classList.add("hidden");
  const url = "https://liff.line.me/" + LIFF_ID;
  $("#main").innerHTML = `<div class="empty"><div class="big">💬</div>
    <div>${esc(msg)}</div>
    <div class="spacer"></div><div class="spacer"></div>
    <a class="btn" href="${url}" style="text-decoration:none;">在 LINE 開啟</a>
    <div class="faint" style="margin-top:12px;word-break:break-all;">或複製這條連結到 LINE 點開：<br>${url}</div></div>`;
}
let _invite = null;
function showJoinPrompt(g, token){
  _invite = { id:g.id, token };
  view = "join";
  $("#title").textContent = "邀請加入";
  $("#backBtn").classList.add("hidden"); $("#brandIcon").classList.add("hidden"); $("#addGatheringBtn").classList.add("hidden");
  const tot = grandTotal(g.items, g.adjustments);
  $("#main").innerHTML = `
    <div class="card" style="text-align:center;">
      <img src="logo_icon.svg" alt="" style="width:56px;height:65px;">

      <div style="font-size:19px;font-weight:700;margin-top:6px;">${esc(g.title||"未命名聚會")}</div>
      <div class="faint" style="margin-top:4px;">${esc(g.date||"")} ・ ${(g.members||[]).length} 人 ・ 總額 ${money(tot)}</div>
      <div class="muted" style="margin-top:14px;">你被邀請加入這場分帳。加入後它會出現在你的聚會列表，你也能新增自己的支出。</div>
    </div>
    <button class="btn block" onclick="acceptJoin()">加入這場聚會</button>
    <div class="spacer"></div>
    <button class="btn ghost block" onclick="declineJoin()">先不要</button>`;
}
async function acceptJoin(){
  if(!_invite) return;
  $("#main").innerHTML = loadingHTML("加入中…");
  try{ current = await Store.join(_invite.id, _invite.token); }
  catch(e){ console.error(e); toast("加入失敗"); return renderList(); }
  history.replaceState(null, "", location.pathname);   // 清掉 hash 邀請參數
  _invite = null;
  subscribeRealtime(current.id);
  renderEdit(false);
}
function declineJoin(){ _invite=null; history.replaceState(null,"",location.pathname); renderList(); }

/* =========================================================================
 * 啟動：LINE 登入（必須）→ 邀請連結 #g&t（成員直接開／非成員問加入）→ 否則我的列表
 * ========================================================================= */
async function boot(){
  try{
    if(typeof liff==="undefined" || !LIFF_ID){ showLoginError("這個 app 需要在 LINE 內開啟"); return; }
    await liff.init({ liffId: LIFF_ID });
    inLineClient = liff.isInClient();
    if(!inLineClient){ showLoginError("「欸，算一下！」請在 LINE 內開啟使用"); return; }   // 只限 LINE 內
    if(!liff.isLoggedIn()){ liff.login(); return; }   // LINE 內若未登入，導向登入後返回
    liffReady = true;
    const prof = await liff.getProfile();
    MY_UID = prof.userId; MY_NAME = prof.displayName || "我";
    ACCESS_TOKEN = liff.getAccessToken();
  }catch(e){ console.error("LIFF login failed:", e); showLoginError("LINE 登入失敗，請重開或在 LINE 內開啟"); return; }
  if(!ACCESS_TOKEN){ showLoginError("拿不到 LINE 登入資訊，請在 LINE 內開啟"); return; }

  const qp = new URLSearchParams(location.search || "");
  const hp = new URLSearchParams((location.hash||"").replace(/^#/,""));
  const gid = qp.get("g") || hp.get("g");
  const tok = qp.get("t") || hp.get("t");
  if(gid && tok){
    $("#title").textContent = "載入中…";
    $("#main").innerHTML = loadingHTML("載入聚會中…");
    try{
      const g = await Store.get(gid, tok);
      if(g){
        if((g.members||[]).some(m=>m.uid===MY_UID)){ current=g; subscribeRealtime(g.id); renderEdit(false); return; }
        showJoinPrompt(g, tok); return;
      }
    }catch(e){ console.error(e); }
    toast("連結無效或已被刪除");
  }
  renderList();
}
boot();
</script>
</body>
</html>
