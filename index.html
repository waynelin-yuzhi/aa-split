<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1115">
<link rel="icon" type="image/svg+xml" href="app_icon.svg">
<link rel="apple-touch-icon" href="app_icon.svg">
<meta name="description" content="簡單好用的多人分帳小工具，點開就能加入帳本、各自記支出、自動算出最少轉帳。">
<meta property="og:title" content="欸，算一下！ Let's Split">
<meta property="og:description" content="簡單好用的多人分帳小工具，點開就能加入。">
<meta property="og:type" content="website">
<title>欸，算一下！ Let's Split</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta name="robots" content="noindex">
<meta name="referrer" content="no-referrer">
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1f232c; --line:#2a2f3a;
    --ink:#e8eaed; --muted:#9aa1ad; --faint:#6b7280;
    --accent:#7dd3a8; --accent2:#5eb98a; --warn:#f0a868; --danger:#e5775f;
    --pay:#e5775f; --get:#7dd3a8;
    --on-accent:#0c1410; --amount:#f0726a;
    --bar-bg:rgba(15,17,21,.86); --rc-bg:linear-gradient(165deg,#13161d,#0e1014);
    --accent-soft:rgba(125,211,168,.14); --accent-bd:rgba(125,211,168,.38);
    --danger-soft:rgba(229,119,95,.12); --danger-bd:rgba(229,119,95,.3);
    --radius:16px;
  }
  html[data-theme="warm"]{
    --bg:#faf6ef; --panel:#fffdf8; --panel2:#f0e7d8; --line:#e7ddcd;
    --ink:#3a342c; --muted:#8a8175; --faint:#b5ac9e;
    --accent:#c8744f; --accent2:#a85a37; --warn:#d98a3a; --danger:#c8584a;
    --pay:#c8584a; --get:#6f8f5a;
    --on-accent:#fffaf3; --amount:#c8584a;
    --bar-bg:rgba(250,246,239,.86); --rc-bg:#fffdf8;
    --accent-soft:rgba(200,116,79,.14); --accent-bd:rgba(200,116,79,.42);
    --danger-soft:rgba(200,88,74,.12); --danger-bd:rgba(200,88,74,.32);
  }
  html[data-theme="forest"]{
    --bg:#eef3e9; --panel:#fafdf6; --panel2:#e2ebd8; --line:#d4e0c8;
    --ink:#2c3528; --muted:#74806c; --faint:#a6b29a;
    --accent:#4f8f5a; --accent2:#3c7046; --warn:#d8973a; --danger:#c55a47;
    --pay:#c55a47; --get:#4f8f5a;
    --on-accent:#fbfff7; --amount:#c55a47;
    --bar-bg:rgba(238,243,233,.86); --rc-bg:#fafdf6;
    --accent-soft:rgba(79,143,90,.14); --accent-bd:rgba(79,143,90,.42);
    --danger-soft:rgba(197,90,71,.12); --danger-bd:rgba(197,90,71,.32);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;
    font-size:16px; line-height:1.5;}
  body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
  .num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum";}
  .app{max-width:520px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;}
  header.bar{position:sticky; top:0; z-index:10; background:var(--bar-bg);
    backdrop-filter:saturate(140%) blur(10px); border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:10px; padding:14px 16px;}
  header.bar h1{font-size:18px; margin:0; font-weight:650; flex:1;}
  .brand-icon{width:26px; height:30px; flex:0 0 auto;}
  .empty img.logo-mark{width:62px; height:72px; opacity:.95;}
  .btn{appearance:none; border:0; border-radius:12px; padding:11px 16px; font-size:15px;
    font-weight:600; color:var(--on-accent); background:var(--accent); cursor:pointer;}
  .btn:active{transform:translateY(1px);}
  .btn.ghost{background:var(--panel2); color:var(--ink);}
  .btn.line{background:#06c755; color:#fff;}
  .btn.sm{padding:7px 12px; font-size:13px; border-radius:10px;}
  .btn.block{width:100%; padding:15px; font-size:16px; border-radius:14px;}
  .btn.danger{background:transparent; color:var(--danger); border:1px solid var(--line);}
  .iconbtn{background:var(--panel2); color:var(--muted); border:0; width:38px; height:38px;
    border-radius:10px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
  main{flex:1; padding:16px; padding-bottom:28px;}
  .muted{color:var(--muted);} .faint{color:var(--faint); font-size:13px;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:14px;}
  .sect-title{font-size:13px; color:var(--muted); font-weight:600; letter-spacing:.04em;
    margin:4px 2px 10px; text-transform:uppercase;}
  label.fld{display:block; margin-bottom:12px;}
  label.fld > span{display:block; font-size:13px; color:var(--muted); margin-bottom:6px;}
  input,select{width:100%; background:var(--panel2); border:1px solid var(--line); color:var(--ink);
    border-radius:11px; padding:12px 13px; font-size:16px; outline:none;}
  input:focus,select:focus{border-color:var(--accent2);}
  .row{display:flex; gap:10px;}
  .row > .btn{flex:1; min-width:0;}
  .row > *{flex:1;}
  .chip{display:inline-flex; align-items:center; gap:6px; background:var(--panel2);
    border:1px solid var(--line); color:var(--ink); border-radius:999px; padding:8px 13px;
    font-size:14px; cursor:pointer; user-select:none;}
  .chip.on{background:var(--accent); color:var(--on-accent); border-color:var(--accent);}
  .chip.me{border-color:var(--accent);}
  .chip.claimchip{cursor:pointer; border-color:var(--accent); color:var(--ink); font-weight:650; padding:10px 16px; font-size:15px;}
  .chip.claimchip:active{background:var(--accent); color:var(--on-accent);}
  .mdot{display:inline-block; width:9px; height:9px; border-radius:50%; flex:0 0 auto;
    border:1.6px solid var(--faint); background:transparent; vertical-align:middle;}
  .mdot.on{background:var(--accent); border-color:var(--accent);}
  .mm-legend{display:flex; gap:16px; flex-wrap:wrap; margin-bottom:14px;}
  .mm-legend .lg{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--muted);}
  .histrow{display:flex; gap:10px; padding:9px 2px; border-bottom:1px solid var(--line); font-size:13.5px;}
  .histrow:last-child{border-bottom:0;}
  .histrow .ht{flex:0 0 auto; color:var(--muted); width:80px;}
  .histrow .hb{flex:1; min-width:0; color:var(--ink);}
  .histrow .hb b{color:var(--accent); font-weight:650;}
  .amt-row{display:flex; gap:8px; align-items:stretch;}
  .amt-row input{flex:1; min-width:0;}
  .calc-btn{flex:0 0 auto; width:50px; background:var(--panel2); border:1px solid var(--line); border-radius:10px;
    cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--accent);}
  .calc-btn svg{width:22px; height:22px;}
  .calc-card{max-width:320px;}
  .calc-disp{background:var(--panel2); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:12px; text-align:right;}
  .calc-expr{font-size:22px; font-weight:700; word-break:break-all; min-height:28px;}
  .calc-res{font-size:13px; color:var(--muted); margin-top:2px;}
  .calc-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .ck{padding:14px 0; font-size:18px; font-weight:600; border-radius:12px; border:1px solid var(--line); background:var(--panel2); color:var(--ink); cursor:pointer;}
  .ck-op{color:var(--accent);} .ck-fn{color:var(--muted); font-size:16px;}
  .ck-eq{background:var(--accent); color:var(--on-accent); border-color:var(--accent);}
  .ck:active{transform:translateY(1px);}
  .chip .x{color:var(--faint); font-weight:700;}
  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .empty{text-align:center; color:var(--muted); padding:48px 20px;}
  .empty .big{font-size:40px; margin-bottom:10px;}
  /* list rows */
  .hero{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:11px 13px; margin-bottom:14px; text-align:center;}
  .hero-stats{display:flex; justify-content:space-around; gap:8px;}
  .hero .hs{display:flex; flex-direction:column; align-items:center; gap:2px; flex:1; min-width:0;}
  .hero .hs-num{font-size:21px; font-weight:800; color:var(--accent); font-variant-numeric:tabular-nums; line-height:1.05;}
  .hero .hs-lab{font-size:11.5px; color:var(--muted);}
  .hero-foot{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:9px;}
  .hero-badges{display:flex; flex-wrap:wrap; gap:6px; min-width:0;}
  .hero .badge{position:relative; overflow:hidden; display:inline-flex; align-items:center; justify-content:center;
    background:var(--panel2); color:var(--ink); border:1px solid var(--line); border-radius:10px; padding:4px; font-weight:650;}
  .hero .badge-ic{display:inline-flex; flex:0 0 auto;}
  .hero .badge-ic svg{width:20px; height:20px; display:block;}
  .hero .badge::after{content:''; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(110deg, transparent 34%, rgba(255,255,255,.75) 47%, rgba(255,224,140,.55) 53%, transparent 66%);
    transform:translateX(-130%); animation:badgeShine 3.4s ease-in-out infinite;}
  .hero .badge:nth-child(2)::after{animation-delay:.5s;}
  .hero .badge:nth-child(3)::after{animation-delay:1s;}
  .hero .badge:nth-child(4)::after{animation-delay:1.5s;}
  @keyframes badgeShine{0%,55%{transform:translateX(-130%);} 78%,100%{transform:translateX(130%);}}
  @media (prefers-reduced-motion: reduce){ .hero .badge::after{animation:none;} }
  .hero-invite{background:transparent; border:0; color:var(--accent); font-size:12.5px; font-weight:650; cursor:pointer; white-space:nowrap; flex:0 0 auto; padding:0;}
  .listrow{display:flex; align-items:center; gap:12px; padding:14px 16px; background:var(--panel);
    border:1px solid var(--line); border-radius:14px; margin-bottom:10px; cursor:pointer;}
  .listrow:active{background:var(--panel2);}
  .listrow .meta{flex:1; min-width:0;}
  .listrow .meta .t{font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .listrow .meta .s{font-size:13px; color:var(--muted);}
  .listrow .amt{font-weight:700; color:var(--accent);}
  .listrow .drag{flex:0 0 auto; display:flex; align-items:center; color:var(--faint); cursor:grab;
    padding:6px 2px; margin:-6px 0; touch-action:none; user-select:none;}
  .listrow.dragging{position:fixed; z-index:60; box-shadow:0 12px 30px rgba(0,0,0,.55); opacity:.97; cursor:grabbing;}
  .drag-ph{border:1px dashed var(--line); border-radius:14px; margin-bottom:10px; background:var(--accent-soft);}
  .itemrow{display:flex; align-items:center; gap:10px; padding:12px 0; border-bottom:1px solid var(--line);}
  .itemrow:last-child{border-bottom:0;}
  .itemrow .info{flex:1; min-width:0;}
  .itemrow .info .nm{font-weight:600;}
  .itemrow .info .sub{font-size:12.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .itemrow .price{font-weight:700; color:var(--amount); text-align:right; white-space:nowrap;}
  .itemrow .price .basconv{display:block; font-size:11px; color:var(--muted); font-weight:500;}
  .daygroup{display:flex; align-items:baseline; justify-content:space-between; gap:10px; font-size:13px; font-weight:650; color:var(--accent); padding:13px 2px 5px;}
  .daygroup .daysum{color:var(--muted); font-weight:600; font-size:12px;}
  .itemrow .caticon{flex:0 0 auto; width:30px; height:30px; display:flex; align-items:center; justify-content:center;}
  .itemrow .caticon svg{width:25px; height:25px;}
  .catpick{gap:7px;}
  .catchip{padding:7px 11px;}
  .catchip .cati{display:inline-flex; vertical-align:-4px; margin-right:5px;}
  .catchip .cati svg{width:18px; height:18px;}
  /* result card */
  #resultCard{background:var(--rc-bg); border:1px solid var(--line);
    border-radius:20px; padding:20px; }
  #resultCard .rc-head{display:flex; align-items:baseline; justify-content:space-between; gap:10px;}
  #resultCard .rc-title{font-size:19px; font-weight:700;}
  #resultCard .rc-sub{font-size:13px; color:var(--muted); margin-top:2px;}
  #resultCard .rc-total{font-size:13px; color:var(--muted); text-align:right;}
  #resultCard .rc-total b{display:block; font-size:22px; color:var(--ink); font-weight:750;}
  .rc-block{margin-top:18px;}
  .rc-block .h{font-size:12px; letter-spacing:.05em; color:var(--faint); text-transform:uppercase; margin-bottom:9px;}
  .rec-tr{display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:14.5px; padding:5px 0;}
  .rec-tr .num{font-weight:700; color:var(--get); flex:0 0 auto;}
  .person{display:flex; align-items:center; justify-content:space-between; padding:7px 0; font-size:15px;}
  .person .nm{flex:1;}
  .person .ow{color:var(--muted); width:120px; text-align:right;}
  .person .net{width:96px; text-align:right; font-weight:650;}
  .net.pos{color:var(--get);} .net.neg{color:var(--pay);}
  .transfer{display:flex; align-items:center; flex-wrap:wrap; gap:6px; row-gap:8px; padding:10px 12px; background:var(--panel);
    border:1px solid var(--line); border-radius:12px; margin-bottom:8px; font-size:15.5px;}
  .transfer .from{color:var(--pay); font-weight:650; white-space:nowrap;}
  .transfer .arr{color:var(--faint);}
  .transfer .to{color:var(--get); font-weight:650; white-space:nowrap;}
  .transfer .v{font-weight:750; white-space:nowrap;}
  .transfer .tr-acts{margin-left:auto; display:flex; align-items:center; gap:6px; flex:0 0 auto;}
  .transfer .paidbtn{background:var(--panel2); color:var(--muted); border:1px solid var(--line);
    border-radius:8px; padding:5px 9px; font-size:11.5px; cursor:pointer; flex:0 0 auto; white-space:nowrap;}
  .transfer .copyacct{background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent-bd);
    border-radius:8px; padding:5px 7px; cursor:pointer; flex:0 0 auto; display:inline-flex; align-items:center;}
  .transfer .copyacct svg{width:18px; height:18px; display:block;}
  .transfer.pending{border-color:rgba(240,190,90,.4);}
  .transfer .confirmbtn{background:var(--panel2); color:var(--accent); border:1px solid var(--accent-bd);
    border-radius:8px; padding:5px 9px; font-size:11.5px; cursor:pointer; flex:0 0 auto; white-space:nowrap;}
  .transfer .confirmbtn.me{background:var(--accent); color:var(--on-accent); border-color:var(--accent); font-weight:700;}
  .transfer .waithint{flex:0 0 auto; font-size:11.5px; color:var(--faint); white-space:nowrap; padding:5px 4px;}
  .transfer.paid{opacity:.55;}
  .transfer.paid .v{text-decoration:line-through;}
  .transfer.paid .paidbtn{background:var(--accent-soft); color:var(--accent); border-color:var(--accent-bd);}
  .payinfo{font-size:12.5px; color:var(--muted); margin:-3px 2px 9px 8px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .payinfo .remindbtn{background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent-bd);
    border-radius:7px; padding:3px 10px; font-size:11.5px; cursor:pointer; flex:0 0 auto;}
  .payinfo .undobtn{background:transparent; color:var(--faint); border:0; padding:3px 4px; font-size:11.5px; cursor:pointer; text-decoration:underline;}
  .settle-prog{font-size:12.5px; color:var(--muted); text-align:center; margin-top:10px;}
  .verify{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--accent);
    background:var(--accent-soft); border:1px solid var(--accent-bd); border-radius:999px; padding:5px 11px; margin-top:14px;}
  .verify.bad{color:var(--danger); background:var(--danger-soft); border-color:var(--danger-bd);}
  .actions{display:flex; gap:10px; margin-top:16px;}
  .actions > *{flex:1;}
  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
    background:#2a2f3a; color:#fff; padding:11px 18px; border-radius:12px; font-size:14px;
    opacity:0; pointer-events:none; transition:.25s; z-index:50; box-shadow:0 8px 24px rgba(0,0,0,.4);}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .syncbar{position:fixed; left:50%; top:14px; transform:translateX(-50%) translateY(-20px);
    background:var(--accent); color:var(--on-accent); padding:10px 18px; border-radius:999px; font-size:14px;
    font-weight:600; cursor:pointer; opacity:0; pointer-events:none; transition:.25s; z-index:60;
    box-shadow:0 8px 24px rgba(0,0,0,.4);}
  .syncbar.show{opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto;}
  .hint{font-size:12.5px; color:var(--faint); margin:-2px 2px 12px;}
  .recon{margin-top:12px; font-size:13px; border-radius:10px; padding:9px 12px; text-align:center; font-weight:600;}
  .recon.ok{color:var(--accent); background:var(--accent-soft);}
  .recon.bad{color:var(--warn); background:rgba(240,168,104,.12);}
  .spinner{width:34px; height:34px; border-radius:50%; border:3px solid var(--line);
    border-top-color:var(--accent); animation:spin .8s linear infinite; margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  /* 編輯頁：摘要卡 + 快捷列 + 浮動＋ */
  .gsum .gtitle{width:100%; background:transparent; border:0; color:var(--ink); font-size:21px; font-weight:750; padding:2px 0; outline:none;}
  .gsum .gsum-row{display:flex; align-items:center; gap:12px; margin-top:8px;}
  .gsum .gsum-row input[type=date]{flex:0 0 auto; width:auto; background:var(--panel2); border:1px solid var(--line);
    color:var(--muted); border-radius:10px; padding:6px 11px; font-size:13px;}
  .gsum-meta{color:var(--muted); font-size:13.5px;}
  .gsum-meta b{color:var(--ink);}
  .gsum{position:relative;}
  .gsum.has-cover{min-height:148px; display:flex; flex-direction:column; justify-content:flex-end; background-size:cover; background-position:center; border:0;}
  .gsum.has-cover .gtitle{color:#fff; text-shadow:0 1px 5px rgba(0,0,0,.7);}
  .gsum.has-cover .gtitle::placeholder{color:rgba(255,255,255,.75);}
  .gsum.has-cover .gsum-meta{color:rgba(255,255,255,.95); text-shadow:0 1px 4px rgba(0,0,0,.7);}
  .gsum.has-cover .gsum-meta b{color:#fff;}
  .gsum.has-cover .gsum-row input[type=date]{background:rgba(0,0,0,.4); border-color:rgba(255,255,255,.35); color:#fff;}
  .cover-ctrl{position:absolute; top:10px; right:10px; display:flex; gap:6px; z-index:4;}
  .cover-btn{background:rgba(0,0,0,.45); color:#fff; border:1px solid rgba(255,255,255,.35); border-radius:999px;
    padding:5px 11px; font-size:12px; cursor:pointer; backdrop-filter:blur(4px);}
  .cover-icon{padding:6px; display:inline-flex; align-items:center; justify-content:center; border-radius:10px;}
  .cover-icon svg{width:19px; height:19px; display:block;}
  .gsum:not(.has-cover) .cover-btn{background:var(--panel2); color:var(--muted); border-color:var(--line); backdrop-filter:none;}
  .cover-menu{display:none; position:absolute; top:calc(100% + 6px); right:0; z-index:5; flex-direction:column;
    background:rgba(0,0,0,.8); border:1px solid rgba(255,255,255,.2); border-radius:12px; overflow:hidden; backdrop-filter:blur(6px); min-width:108px;}
  .cover-menu.open{display:flex;}
  .cover-menu button{background:transparent; border:0; color:#fff; font-size:13.5px; text-align:left; padding:11px 15px; cursor:pointer; white-space:nowrap;}
  .cover-menu button:active{background:rgba(255,255,255,.14);}
  .cover-menu button + button{border-top:1px solid rgba(255,255,255,.13);}
  .gsum.adjusting{padding-bottom:34px;}
  .gsum .cover-slider{position:absolute; left:14px; right:14px; bottom:9px; width:auto; z-index:3; accent-color:var(--accent);}
  .listrow.has-cover{min-height:98px; align-items:flex-end; border:0; background-repeat:no-repeat;}
  .listrow.has-cover .t{color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.75);}
  .listrow.has-cover .s{color:rgba(255,255,255,.92); text-shadow:0 1px 4px rgba(0,0,0,.75);}
  .listrow.has-cover .amt{color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.75);}
  .listrow.has-cover .drag,.listrow.has-cover .faint{color:rgba(255,255,255,.85);}
  .quickbar{display:flex; gap:10px; overflow-x:auto; padding:0 0 14px;}
  .qbtn{flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:5px; background:var(--panel);

<script>
"use strict";

/* =========================================================================
 * 設定：填入你的 LIFF ID（LINE Developers → LIFF）。留空也能在瀏覽器使用。
 * ========================================================================= */
const LIFF_ID = "2010401423-LXxOHE2H";

/* Supabase 後端（publishable key 是公開金鑰、可放前端；隱私靠 RLS 全鎖 + RPC） */
const SUPABASE_URL = "https://ytlakkxrbookftluulbo.supabase.co";
const SUPABASE_KEY = "sb_publishable_WMQUMN8bIlHTwwR95bLueA_VUOI_Drd";

/* =========================================================================
 * 計算引擎 —— 忠實移植自 aa-split skill 的 aa.py
 *   淨值法（已付 − 應付）→ 最少轉帳配對 → 六道驗算
 *   差異：零頭採整數淨值法（殘差由最大收款人吸收），轉帳保證對帳歸零。
 * ========================================================================= */
// 一筆項目的有效金額（指定金額模式 = 各人金額加總，其餘 = 金額欄）
// 多幣別：結算幣固定台幣；每筆 item 存 currency + rate（→台幣、輸入時凍結）。缺值＝台幣、rate 1。
const CURRENCIES = [
  {code:'TWD', sym:'$',   label:'台幣'}, {code:'JPY', sym:'¥',   label:'日圓'},
  {code:'USD', sym:'US$', label:'美金'}, {code:'KRW', sym:'₩',   label:'韓元'},
  {code:'EUR', sym:'€',   label:'歐元'}, {code:'CNY', sym:'CN¥', label:'人民幣'},
  {code:'HKD', sym:'HK$', label:'港幣'}, {code:'THB', sym:'฿',   label:'泰銖'},
  {code:'SGD', sym:'S$',  label:'新幣'}, {code:'GBP', sym:'£',   label:'英鎊'},
  {code:'VND', sym:'₫',   label:'越南盾'},{code:'MYR', sym:'RM',  label:'馬幣'}
];
const curSym = code => { const c = CURRENCIES.find(x=>x.code===code); return c?c.sym:(code||'$'); };
const _rateCache = {};
async function fetchRate(from, to){   // 1 from = ? to；失敗回 null（讓使用者手填）
  if(!from || from===to) return 1;
  const key = from+'_'+to;
  if(_rateCache[key]) return _rateCache[key];
  try{
    const r = await fetch(`https://open.er-api.com/v6/latest/${from}`);
    const d = await r.json();
    const rate = d && d.rates && d.rates[to];
    if(rate){ _rateCache[key] = rate; return rate; }
  }catch(e){ console.error('fetchRate', e); }
  return null;
}
function effectiveItemAmount(it){   // 原幣金額（顯示用、換算基底）
  const sharers = (it.sharerIds || []);
  if(it.split && it.split.mode === 'amount'){
    return sharers.reduce((s,id)=> s + (Number(it.split.values?.[id]) || 0), 0);
  }
  return Number(it.amount) || 0;
}
function itemBaseAmount(it){ return effectiveItemAmount(it) * (Number(it.rate)||1); }   // 換算成台幣
function itemsTotal(items){
  return (items || []).reduce((s,it)=>{
    const amt = itemBaseAmount(it);
    return s + ((amt>0 && (it.sharerIds||[]).length>0) ? amt : 0);
  }, 0);
}
// 整單調整層：服務費/折扣，按消費比例分攤。sign +1 加價 / -1 折扣
function adjustTotal(subtotal, adjustments){
  return (adjustments || []).reduce((s,a)=>{
    const amt = a.kind==='pct' ? subtotal*(Number(a.value)||0)/100 : (Number(a.value)||0);
    return s + amt*(a.sign||1);
  }, 0);
}
function grandTotal(items, adjustments){
  const sub = itemsTotal(items);
  return sub + adjustTotal(sub, adjustments);
}

function computeSplit(members, items, adjustments, recordedTransfers){
  const ids = members.map(m => m.id);
  const nameOf = Object.fromEntries(members.map(m => [m.id, m.name]));

  const owe  = Object.fromEntries(ids.map(id => [id, 0]));
  const paid = Object.fromEntries(ids.map(id => [id, 0]));
  let total = 0;

  // 每筆支出：分攤名單 + 分法（均分/份數/指定金額）決定 owe；付款人決定 paid
  for(const it of items){
    const sharers = (it.sharerIds || []).filter(id => id in owe);
    if(sharers.length === 0) continue;
    const r = Number(it.rate) || 1;   // 換算成結算幣（台幣）；owe 與 paid 同乘 r，守恆不變
    const mode = (it.split && it.split.mode) || 'equal';
    const amt = (Number(it.amount) || 0) * r;
    let itemAmt = 0;
    if(mode === 'amount'){
      const vals = sharers.map(s => (Number(it.split.values?.[s]) || 0) * r);
      itemAmt = vals.reduce((a,b)=>a+b, 0);
      if(itemAmt <= 0) continue;
      sharers.forEach((s,k)=> owe[s] += vals[k]);
    } else if(mode === 'shares'){
      if(amt <= 0) continue; itemAmt = amt;
      let tot = 0; for(const s of sharers) tot += (Number(it.split.values?.[s]) || 1);
      if(tot <= 0) tot = sharers.length;
      for(const s of sharers) owe[s] += amt * (Number(it.split.values?.[s]) || 1) / tot;
    } else {
      if(amt <= 0) continue; itemAmt = amt;
      const per = amt / sharers.length;
      for(const s of sharers) owe[s] += per;
    }
    total += itemAmt;
    if(it.payerId && it.payerId in paid) paid[it.payerId] += itemAmt;
  }

  // 整單調整層：服務費/折扣按比例分攤——應付與已付兩側同步 scale，保持守恆
  const subtotal = total;
  const adjustment = adjustTotal(subtotal, adjustments);
  total = subtotal + adjustment;
  if(subtotal > 0 && adjustment !== 0){
    const scale = total / subtotal;
    for(const id of ids){ owe[id] *= scale; paid[id] *= scale; }
  }

  // 淨值 = 已付 − 應付
  const net = Object.fromEntries(ids.map(id => [id, paid[id] - owe[id]]));

  // 已記錄的實際轉帳/還款：付款人淨值 +、收款人淨值 −（零和），淨值變成「還剩多少要喬」
  for(const t of (recordedTransfers||[])){
    const amt = Number(t.amount)||0;
    if(amt>0 && t.from in net && t.to in net){ net[t.from] += amt; net[t.to] -= amt; }
  }

  // 整數化淨值，殘差丟給最大收款人（零頭吸收），保證總和 = 0
  const netR = Object.fromEntries(ids.map(id => [id, Math.round(net[id])]));
  let residual = -ids.reduce((s,id) => s + netR[id], 0);
  if(residual !== 0){
    const maxCreditor = ids.slice().sort((a,b) => net[b] - net[a])[0];
    netR[maxCreditor] += residual;
  }

  // 最少轉帳配對（貪婪：最大欠款人 ↔ 最大收款人）
  const creditors = ids.filter(id => netR[id] > 0).map(id => [id, netR[id]]).sort((a,b)=>b[1]-a[1]);
  const debtors   = ids.filter(id => netR[id] < 0).map(id => [id, -netR[id]]).sort((a,b)=>b[1]-a[1]);
  const transfers = [];
  let i=0, j=0;
  while(i < debtors.length && j < creditors.length){
    const pay = Math.min(debtors[i][1], creditors[j][1]);
    if(pay > 0) transfers.push({from:debtors[i][0], to:creditors[j][0], amount:pay});
    debtors[i][1] -= pay; creditors[j][1] -= pay;
    if(debtors[i][1] === 0) i++;
    if(creditors[j][1] === 0) j++;
  }

  // 六道驗算
  const checks = [];
  const paidSum = ids.reduce((s,id)=>s+paid[id],0);
  checks.push({ok: Math.abs(paidSum-total)<0.01, label:`實付總額 = 消費總額`});
  const oweSum = ids.reduce((s,id)=>s+owe[id],0);
  checks.push({ok: Math.abs(oweSum-total)<0.01, label:`應付總和 = 總額`});
  checks.push({ok: Math.abs(ids.reduce((s,id)=>s+net[id],0))<0.01, label:`淨值總和 = 0`});
  const payers = new Set(transfers.map(t=>t.from)), receivers = new Set(transfers.map(t=>t.to));
  let dirOk = true;
  for(const id of ids){
    if(netR[id] > 0 && payers.has(id)) dirOk = false;
    if(netR[id] < 0 && receivers.has(id)) dirOk = false;
  }
  checks.push({ok:dirOk, label:`金流方向正確（正者收、負者付）`});
  const out = Object.fromEntries(ids.map(id=>[id,0])), inc = Object.fromEntries(ids.map(id=>[id,0]));
  for(const t of transfers){ out[t.from]+=t.amount; inc[t.to]+=t.amount; }
  let reconOk = true;
  for(const id of ids){ if(Math.abs((out[id]-inc[id]) - (-netR[id])) > 1.01) reconOk = false; }
  checks.push({ok:reconOk, label:`逐人對帳吻合`});
  checks.push({ok: transfers.length <= Math.max(0, ids.length-1), label:`轉帳筆數 ≤ 人數−1`});
  const allOk = checks.every(c=>c.ok);

  return {members, nameOf, total, subtotal, adjustment, adjustments: adjustments||[], owe, paid, net, netR, transfers, checks, allOk};
}

/* =========================================================================
 * 雲端後端（Supabase）+ 儲存層
 *   - 每場聚會存 Supabase，用「不可猜 id + share_token」當連結鑰匙（capability）
 *   - 本機只存一份索引（aa_index_v1）給列表用，完整資料即時從雲端讀
 *   - 沒設定金鑰時自動退回 localStorage（純本機）
 * ========================================================================= */
const sb = (SUPABASE_URL && SUPABASE_KEY && window.supabase)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
const CLOUD = !!sb;

async function rpc(name, args){
  const { data, error } = await sb.rpc(name, args);
  if(error) throw error;
  return Array.isArray(data) ? data[0] : data;
}
// 雲端 row ↔ app 物件（members↔participants、date↔event_date）
function rowToGathering(row, token){
  return {
    id: row.id, ownerId: row.owner_id || null, fastPayUid: row.fast_pay_uid || null, shareToken: row.share_token || token, slug: row.slug || null,
    title: row.title || "", date: row.event_date || "",
    currency: row.currency || "TWD", status: row.status || "open",
    members: row.participants || [], items: row.items || [],
    adjustments: row.adjustments || [], settlements: row.settlements || [],
    history: row.history || [], cover: row.cover || '', transfers: row.transfers || []
  };
}

// g_list 回 setof（多列）；其餘 RPC 回單列
async function rpcRows(name, args){
  const { data, error } = await sb.rpc(name, args);
  if(error) throw error;
  return Array.isArray(data) ? data : (data ? [data] : []);
}

// 一本帳是否「結清」：有實際消費，且最少轉帳全部已確認（或打平、不用轉）
function rowSettled(r){
  const items = r.items||[], adjustments = r.adjustments||[];
  if(!(grandTotal(items, adjustments) > 0)) return false;
  const members = (r.participants||[]).map(p=>({id:p.id, name:p.name}));
  const res = computeSplit(members, items, adjustments, r.transfers||[]);
  if(res.transfers.length === 0) return true;   // 打平/已喬平
  const sm = normSettle(r.settlements);
  return res.transfers.every(t => { const s = sm[t.from+">"+t.to]; return !!(s && s.confirmed); });
}

// 身分制：所有操作帶 ACCESS_TOKEN，後端用它驗證 LINE 身分
const Store = {
  async list(){   // 我有份的聚會（owner 或成員），跟身分跑；順手算個人成就統計
    const rows = await rpcRows("g_list", { p_access_token: ACCESS_TOKEN });
    const out = rows.map(r => ({
      id: r.id, title: r.title, date: r.event_date, cover: r.cover || '',
      n: (r.participants||[]).length, count: (r.items||[]).length,
      total: grandTotal(r.items, r.adjustments), updatedAt: r.updated_at,
      settled: rowSettled(r)
    }));
    let items=0, total=0, settled=0, payfast=0; const friends = new Set();
    rows.forEach((r,i)=>{
      items += (r.items||[]).length;
      total += out[i].total;
      if(out[i].settled) settled++;
      if(r.fast_pay_uid && r.fast_pay_uid===MY_UID) payfast++;
      for(const p of (r.participants||[])){
        if(p.uid && p.uid===MY_UID) continue;
        if(!p.uid && p.name===MY_NAME) continue;
        friends.add(p.uid ? ('u:'+p.uid) : ('n:'+p.name));
      }
    });
    _myStats = { gatherings: rows.length, items, total, friends: friends.size, settled, payfast };

async function onAvatarPicked(e){

    const path = `avatars/${MY_UID||'x'}/${randHex(20)}.jpg`;
    const up = await sb.storage.from('covers').upload(path, blob, {contentType:'image/jpeg', upsert:false});

function tierFromCount(thr, n){ let t=0; for(let i=0;i<thr.length;i++){ if(n>=thr[i]) t=i+1; } return t; }
function tierFromRank(thr, rank){ if(!rank) return 0; if(rank<=thr[2]) return 3; if(rank<=thr[1]) return 2; if(rank<=thr[0]) return 1; return 0; }
// 我在某徽章的等級（0＝未達成）
function myBadgeTier(k){
  const st=_myStats||{}, b=_myBadges||{}, d=BADGE_DEF[k];
  if(k==='elder')    return b.elderRank ? tierFromRank(d.tiers, b.elderRank) : (b.elder?1:0);
  if(k==='master')   return tierFromCount(d.tiers, st.items||0);
  if(k==='king')     return tierFromCount(d.tiers, myInvites());
  if(k==='finisher') return tierFromCount(d.tiers, st.settled||0);
  if(k==='payfast')  return tierFromCount(d.tiers, st.payfast||0);
  if(k==='friend')   return b.wasInvited ? 1 : 0;
  return 0;
}
function earnedBadges(){
  const list=[];
  for(const d of BADGE_DEFS){
    const t = myBadgeTier(d.k);
    if(t>0) list.push({ k:d.k, tier:t, label:d.name,
      desc: d.kind==='single' ? d.how() : `${TIER_NAME[t]}・${d.how(t)}`,
      icon: badgeSvg(d.k, d.kind==='single'?0:t) });
  }
  return list;
}
// 精選徽章：從已解鎖選最多 3 個放主頁；沒選過→預設取前 3
function featuredBadges(){
  const all = earnedBadges();
  const feat = (_myBadges && Array.isArray(_myBadges.featured)) ? _myBadges.featured : [];
  if(!feat.length) return all.slice(0,3);
  const byKey = Object.fromEntries(all.map(b=>[b.k,b]));
  const picked = feat.map(k=>byKey[k]).filter(Boolean);
  return picked.length ? picked.slice(0,3) : all.slice(0,3);
}
// 頭像右下角只放「公開」徽章（含等級）；自己看的 finisher/payfast/friend 不對外
function myFeaturedTop(){
  const pub = featuredBadges().find(b=>PUBLIC_BADGES.includes(b.k));
  return pub ? {k:pub.k, tier:pub.tier} : null;
}
// 徽章圖鑑：列出全部徽章＋銅銀金門檻＋你的進度（沒達成的灰，勾起「還想拿」）

      <div class="bg-how">${d.how(Math.max(1,myT))}</div>

  $("#badgeGuideBody").innerHTML = html;

// 數字往上跳的動畫（IG 追蹤數那種爬升感）
function countUp(el, target, isMoney){
  const dur = 900, start = performance.now();
  const fmt = v => isMoney ? money(v) : Math.round(v).toLocaleString('en-US');
  function tick(now){
    const p = Math.min(1, (now-start)/dur);
    const e = 1 - Math.pow(1-p, 3);   // ease-out
    el.textContent = fmt(target*e);
    if(p<1) requestAnimationFrame(tick); else el.textContent = fmt(target);
  }
  requestAnimationFrame(tick);
}

/* 首頁清單自訂排序：本機快取（依 LINE uid）+ 雲端同步（跨裝置）。有存到的照存的排、沒存的（新的）在前 */
const orderKey = () => `aa_order_${MY_UID||'x'}`;
function loadOrder(){ try{ return JSON.parse(localStorage.getItem(orderKey())||"[]"); }catch(e){ return []; } }
function saveOrderLocal(ids){ try{ localStorage.setItem(orderKey(), JSON.stringify(ids)); }catch(e){} }
function saveOrder(ids){ saveOrderLocal(ids); if(CLOUD && ACCESS_TOKEN) Store.setOrder(ids).catch(e=>console.error(e)); }
async function syncOrderFromCloud(){   // 開機時把雲端順序拉下來蓋本機 → 跨裝置一致
  if(!CLOUD || !ACCESS_TOKEN) return;
  try{ const o = await Store.getOrder(); if(Array.isArray(o)) saveOrderLocal(o); }catch(e){ console.error(e); }
}
function applySavedOrder(gs){
  const ord = loadOrder(); if(!ord.length) return gs;
  const pos = {}; ord.forEach((id,i)=>pos[id]=i);
  return gs.map((g,i)=>[g,i]).sort((a,b)=>{
    const pa = a[0].id in pos ? pos[a[0].id] : -1, pb = b[0].id in pos ? pos[b[0].id] : -1;
    if(pa===-1 && pb===-1) return a[1]-b[1];   // 都沒存：維持原序（updated_at）
    if(pa===-1) return -1;                     // 新的排前面
    if(pb===-1) return 1;
    return pa-pb;
  }).map(x=>x[0]);
}
let _reordered = false;
function enableListDrag(){
  const wrap = $("#listWrap"); if(!wrap) return;
  wrap.querySelectorAll(".drag").forEach(handle=>{
    handle.addEventListener("pointerdown", e=>{
      e.preventDefault(); e.stopPropagation();
      const row = handle.closest(".listrow"); if(!row) return;
      const rect = row.getBoundingClientRect();
      const grabDY = e.clientY - rect.top;
      const ph = document.createElement("div");
      ph.className = "drag-ph"; ph.style.height = rect.height + "px";
      row.parentNode.insertBefore(ph, row.nextSibling);
      row.classList.add("dragging");
      row.style.width = rect.width + "px"; row.style.left = rect.left + "px"; row.style.top = rect.top + "px";
      let moved = false;
      try{ handle.setPointerCapture(e.pointerId); }catch(_){}
      const onMove = ev=>{
        moved = true;
        row.style.top = (ev.clientY - grabDY) + "px";
        const others = [...wrap.querySelectorAll(".listrow:not(.dragging)")];
        let target = null;
        for(const o of others){ const r=o.getBoundingClientRect(); if(ev.clientY < r.top + r.height/2){ target=o; break; } }
        if(target) wrap.insertBefore(ph, target); else wrap.appendChild(ph);
      };
      const onUp = ()=>{
        document.removeEventListener("pointermove", onMove);
        document.removeEventListener("pointerup", onUp);
        ph.parentNode.insertBefore(row, ph); ph.remove();
        row.classList.remove("dragging");
        row.style.width = row.style.left = row.style.top = "";
        if(moved){
          _reordered = true; setTimeout(()=>{ _reordered=false; }, 350);
          saveOrder([...wrap.querySelectorAll(".listrow")].map(r=>r.dataset.id));
        }
      };
      document.addEventListener("pointermove", onMove);
      document.addEventListener("pointerup", onUp);
    });
  });
}

function presetSvg(pic){ return (typeof pic==='string' && pic.slice(0,7)==='preset:') ? (PRESET_AVATARS[pic.slice(7)]||null) : null; }
function validPicUrl(pic){ return (typeof pic==='string' && /^https:\/\//.test(pic) && !/['"\\<>]/.test(pic)) ? pic : null; }
function myAvatar(){ return myProfile().avatar || MY_PIC || ''; }   // 我的有效頭像：個人設定優先，否則 LINE 大頭貼

function avatarParts(pic, name){   // → {style, inner}：preset 出 svg、合法 url 出底圖、否則首字色圈
  const ps = presetSvg(pic); if(ps) return { style:'', inner:ps };
  const url = validPicUrl(pic); if(url) return { style:`background-image:url('${url}')`, inner:'' };
  return { style:`background:${avColor(name)}`, inner:esc((name||'?').slice(0,1)) };
}
function setAvatarEl(el, pic, name){
  if(!el) return;
  const ps = presetSvg(pic);
  if(ps){ el.style.backgroundImage='none'; el.style.backgroundColor=''; el.innerHTML=ps; return; }
  const url = validPicUrl(pic);
  if(url){ el.innerHTML=''; el.style.backgroundColor=''; el.style.backgroundImage=`url('${url}')`; return; }
  el.innerHTML=''; el.style.backgroundImage='none'; el.style.backgroundColor = name?avColor(name):''; el.textContent=(name||'我').slice(0,1);
}

/* 帳本封面底圖：成員可上傳自己的照片；存 Supabase Storage（公開讀、不可猜檔名）。
   cover 欄位格式：<storage 網址>[#p=<垂直位置0-100>]。只認自家 storage 網址、無引號，避免 style 注入。 */
function parseCover(raw){
  if(!raw) return null;
  const url = String(raw).split('#')[0];
  if(url.indexOf(SUPABASE_URL+'/storage/')!==0 || /['"\\]/.test(raw)) return null;
  const m = String(raw).match(/#p=(\d+)/);
  const pos = m ? Math.max(0, Math.min(100, parseInt(m[1],10))) : 50;
  return { url, pos };
}
function coverData(){ return current ? parseCover(current.cover) : null; }
function randHex(n){
  if(window.crypto && crypto.getRandomValues){ const a=new Uint8Array(Math.ceil(n/2)); crypto.getRandomValues(a); return [...a].map(x=>x.toString(16).padStart(2,'0')).join('').slice(0,n); }
  return (Date.now().toString(36)+Math.random().toString(36).slice(2)).replace(/[^a-z0-9]/g,'').slice(0,n);
}
function downscaleImage(file, maxW, quality){
  return new Promise((resolve,reject)=>{
    const url = URL.createObjectURL(file), img = new Image();
    img.onload = ()=>{ URL.revokeObjectURL(url);
      let w=img.width, h=img.height; if(w>maxW){ h=Math.round(h*maxW/w); w=maxW; }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(b=> b?resolve(b):reject(new Error('轉檔失敗')), 'image/jpeg', quality);
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); reject(new Error('讀取圖片失敗')); };
    img.src = url;
  });
}

  const sorted = items.slice().sort((a,b)=>(a.at||'').localeCompare(b.at||''));
  const keys = sorted.map(it => (it.at||'').split('T')[0] || '');
  if(new Set(keys).size <= 1) return sorted.map(itemRowHTML).join("");
  let html = '', curKey = null;
  sorted.forEach((it, i)=>{

      const dayTotal = sorted.reduce((s,x,j)=> j>=0 && keys[j]===curKey ? s+itemBaseAmount(x) : s, 0);
      html += `<div class="daygroup">${esc(fmtDateHeader(curKey))}<span class="daysum num">${money(dayTotal)}</span></div>`;

/* ---- 即時同步：每場聚會一個 Realtime 廣播頻道，存檔後 ping，其他人收到就拉最新 ---- */
let rtChannel = null, rtGid = null, _syncPendingId = null;
function subscribeRealtime(id){
  if(!CLOUD || !id) return;
  if(rtChannel && rtGid === id) return;      // 已訂閱同一場
  unsubscribeRealtime();
  rtGid = id;
  rtChannel = sb.channel("g:" + id, { config: { presence: { key: MY_UID || ('anon_'+uid()) } } });
  rtChannel
    .on("broadcast", { event: "changed" }, () => onRemoteChange(id))
    .on("presence", { event: "sync" }, () => refreshPresence())
    .subscribe((status)=>{ if(status==='SUBSCRIBED'){ try{ rtChannel.track({ uid: MY_UID, at: Date.now() }); }catch(e){} } });
}
function unsubscribeRealtime(){
  if(rtChannel){ try{ sb.removeChannel(rtChannel); }catch(e){} }
  rtChannel = null; rtGid = null; _onlineUids = new Set();
}
// 在線狀態：誰此刻正打開這本帳 → 即時更新頭像綠點（不重畫整頁，避免打斷輸入/捲動）
function refreshPresence(){
  if(!rtChannel) return;
  let st = {}; try{ st = rtChannel.presenceState(); }catch(e){ return; }
  const set = new Set();
  Object.values(st).forEach(arr => (arr||[]).forEach(p => { if(p && p.uid) set.add(p.uid); }));
  _onlineUids = set;
  updatePresenceDots();
}
function updatePresenceDots(){
  document.querySelectorAll('.members-strip .mav').forEach(el=>{
    const u = el.dataset.uid, pic = el.querySelector('.mav-pic'); if(!pic) return;
    let dot = pic.querySelector('.mav-dot');
    const on = !!(u && _onlineUids.has(u));
    if(on && !dot){ dot = document.createElement('span'); dot.className = 'mav-dot'; pic.appendChild(dot); }
    else if(!on && dot){ dot.remove(); }
  });
}

// 合併重複成員：把 drop 的所有帳/轉帳/結清/分攤指向改到 keep，保留有 LINE 身分那筆，分帳數字不變
function mergeMembers(keepId, dropId){
  if(!current || keepId===dropId) return;
  const keep = current.members.find(m=>m.id===keepId), drop = current.members.find(m=>m.id===dropId);
  if(!keep || !drop) return;
  for(const it of (current.items||[])){
    if(it.payerId===dropId) it.payerId = keepId;
    if(Array.isArray(it.sharerIds) && it.sharerIds.includes(dropId)){
      it.sharerIds = it.sharerIds.filter(id=>id!==dropId);
      if(!it.sharerIds.includes(keepId)) it.sharerIds.push(keepId);
    }
    if(it.split && it.split.values && it.split.values[dropId]!=null){
      it.split.values[keepId] = (Number(it.split.values[keepId])||0) + Number(it.split.values[dropId]);
      delete it.split.values[dropId];
    }
  }
  current.transfers = (current.transfers||[])
    .map(t=>({ ...t, from: t.from===dropId?keepId:t.from, to: t.to===dropId?keepId:t.to }))
    .filter(t=>t.from!==t.to);
  const sm = settleMap(), ns = {};
  for(const k in sm){ let [f,t]=k.split(">"); if(f===dropId)f=keepId; if(t===dropId)t=keepId; if(f===t) continue;
    const nk=f+">"+t, cur=ns[nk]||{paid:false,confirmed:false};
    ns[nk]={paid:cur.paid||sm[k].paid, confirmed:cur.confirmed||sm[k].confirmed};
  }
  current.settlements = ns;
  ['uid','pic','payInfo'].forEach(f=>{ if(!keep[f] && drop[f]) keep[f]=drop[f]; });
  try{ if(current.id && localStorage.getItem("aa_me_"+current.id)===dropId) localStorage.setItem("aa_me_"+current.id, keepId); }catch(e){}
  current.members = current.members.filter(m=>m.id!==dropId);
  logHistory(`合併成員：「${drop.name}」併入「${keep.name}」`);
}
function openMergeModal(){
  if(!iAmOwner()){ toast("只有建立這本帳的人可以合併"); return; }
  const m = current.members||[];
  if(m.length<2){ toast("至少要兩位成員才需要合併"); return; }
  // 預設挑「最可能的重複對」：名字相近、且一筆有 LINE 一筆沒有 → 移除預設那筆、保留 LINE 那筆
  let dropDef=null, keepDef=null;
  outer: for(const a of m){ for(const b of m){
    if(a.id===b.id || (!a.uid)===(!b.uid)) continue;
    const na=(a.name||"").toLowerCase().trim(), nb=(b.name||"").toLowerCase().trim();
    if(na && nb && (na.includes(nb)||nb.includes(na))){
      const noU=a.uid?b:a, hasU=a.uid?a:b; dropDef=noU.id; keepDef=hasU.id; break outer;
    }
  }}
  if(!dropDef){ dropDef=m[0].id; keepDef=m[1].id; }
  const opt = sel => m.map(p=>`<option value="${p.id}" ${sel===p.id?"selected":""}>${esc(p.name)}${p.uid?"（LINE）":"（預設）"}</option>`).join("");
  $("#mergeDrop").innerHTML = opt(dropDef);
  $("#mergeKeep").innerHTML = opt(keepDef);
  updateMergeHint();
  $("#mergeModal").classList.remove("hidden");
}

/* 金額簡易計算機 */
let _calc = "";
function openCalc(){
  _calc = ($("#itAmt") && $("#itAmt").value) || (editDraftItem && editDraftItem.amount!=null ? String(editDraftItem.amount) : "") || "";
  renderCalc();
  $("#calcModal").classList.remove("hidden");
}
function closeCalc(){ $("#calcModal").classList.add("hidden"); }
function calcKey(k){
  if(k==='C') _calc="";
  else if(k==='back') _calc=_calc.slice(0,-1);
  else if(k==='=') _calc=String(calcEval(_calc));
  else _calc += k;
  renderCalc();
}
function calcEval(expr){
  try{
    const s = String(expr).replace(/×/g,'*').replace(/÷/g,'/');
    if(s.trim()==='' || !/^[0-9+\-*/.() ]*$/.test(s)) return 0;
    const v = Function('"use strict";return ('+s+')')();
    return (typeof v==='number' && isFinite(v)) ? Math.round(v*100)/100 : 0;
  }catch(e){ return 0; }
}
function renderCalc(){
  $("#calcExpr").textContent = _calc || "0";
  $("#calcResult").textContent = "= " + calcEval(_calc);
}
function calcApply(){
  const v = calcEval(_calc);
  if(editDraftItem) editDraftItem.amount = v;
  const a=$("#itAmt"); if(a) a.value = v;
  closeCalc();
}

}

// 比對舊/新項目，回傳「有變動的欄位＋從→到」陣列（編輯紀錄用，純比對不存快照）
function diffItem(o, n){
  const nm = id => { const m=current.members.find(x=>x.id===id); return m?m.name:'?'; };
  const lab = {equal:'均分', shares:'按份數', amount:'指定金額'};
  const ch = [];
  if((o.name||'') !== (n.name||'')) ch.push(`品名「${o.name||''}」→「${n.name||''}」`);
  const oa=effectiveItemAmount(o), na=effectiveItemAmount(n);
  if(oa !== na) ch.push(`金額 ${money(oa)}→${money(na)}`);
  if(o.payerId !== n.payerId) ch.push(`付款人 ${nm(o.payerId)}→${nm(n.payerId)}`);
  const os=(o.sharerIds||[]).slice().sort().join(','), ns=(n.sharerIds||[]).slice().sort().join(',');
  if(os !== ns) ch.push(`分攤人改為 ${(n.sharerIds||[]).map(nm).join('、')||'無'}`);
  const om=(o.split&&o.split.mode)||'equal', nmode=(n.split&&n.split.mode)||'equal';
  if(om !== nmode) ch.push(`分法 ${lab[om]}→${lab[nmode]}`);
  else if((nmode==='shares'||nmode==='amount') && JSON.stringify((o.split&&o.split.values)||{})!==JSON.stringify((n.split&&n.split.values)||{})) ch.push('分攤明細調整');
  if((o.at||'') !== (n.at||'')) ch.push(`時間 ${fmtAt(o.at)||'—'}→${fmtAt(n.at)||'—'}`);
  if((o.note||'') !== (n.note||'')) ch.push(`備註 ${o.note?`「${o.note}」`:'—'}→${n.note?`「${n.note}」`:'—'}`);
  if((o.cat||'') !== (n.cat||'')) ch.push(`分類 ${catOf(o.cat).label}→${catOf(n.cat).label}`);
  if((o.currency||'TWD') !== (n.currency||'TWD')) ch.push(`幣別 ${o.currency||'TWD'}→${n.currency||'TWD'}`);
  else if((Number(o.rate)||1) !== (Number(n.rate)||1)) ch.push(`匯率 ${o.rate||1}→${n.rate||1}`);
  return ch;
}
function origMoney(it){ return curSym(it.currency||'TWD') + Math.round(effectiveItemAmount(it)).toLocaleString('en-US'); }
function saveItem(){
  const d = editDraftItem;
  d.name = ($("#itName").value||"").trim() || "未命名";
  d.payerId = $("#itPayer").value;
  d.at = ($("#itAt") && $("#itAt").value) || d.at || nowLocal();
  d.note = ($("#itNote") && $("#itNote").value || "").trim();
  d.cat = d.cat || guessCat(d.name); delete d._catManual;
  d.currency = ($("#itCur") && $("#itCur").value) || d.currency || 'TWD';
  if(d.currency==='TWD'){ d.rate = 1; }
  else { const rv = $("#itRate") ? Number($("#itRate").value) : Number(d.rate); d.rate = (rv && rv>0) ? rv : 0; }
  if(d.currency!=='TWD' && (!d.rate || d.rate<=0)){ toast("請填這個幣別的匯率（自動帶入失敗可手動輸入）"); return; }
  delete d._rateManual;
  if(d.sharerIds.length===0){ toast("至少要有一個人分攤"); return; }
  const mode = (d.split && d.split.mode) || 'equal';
  if(mode==='amount'){
    const sum = d.sharerIds.reduce((s,id)=> s + (Number(d.split.values?.[id])||0), 0);
    if(sum<=0){ toast("指定金額至少要有一筆大於 0"); return; }
    d.amount = sum;
  } else {
    d.amount = Number($("#itAmt").value)||0;
    if(d.amount<=0){ toast("金額要大於 0"); return; }
    if(mode==='shares' && d.sharerIds.reduce((s,id)=>s+(Number(d.split.values?.[id])||1),0)<=0){ toast("份數要大於 0"); return; }
  }
  if(d.split && d.split.values) Object.keys(d.split.values).forEach(k=>{ if(!d.sharerIds.includes(k)) delete d.split.values[k]; });
  const isNew = d._isNew; delete d._isNew;
  const i = current.items.findIndex(x=>x.id===d.id);
  if(isNew || i<0){
    current.items.push(d);
    logHistory(`新增「${d.name} ${origMoney(d)}」`);
  } else {
    const changes = diffItem(current.items[i], d);
    current.items[i]=d;
    if(changes.length) logHistory(`編輯「${d.name}」：${changes.join('、')}`);
  }
  editDraftItem=null;
  persistCurrent();
  renderEdit(false);
}
async function deleteItem(){
  if(!await uiConfirm(`確定刪除「${editDraftItem.name||"這筆"}」？`, {danger:true})) return;
  const nm = editDraftItem.name||"這筆";

  logHistory(`刪除「${nm}」`);
  editDraftItem=null;
  persistCurrent();
  renderEdit(false);
}

function startAddTransfer(){
  if(current.members.length<2){ toast('至少要兩個人才能記轉帳'); return; }
  const meId = getMe() || current.members[0].id;
  const other = current.members.find(x=>x.id!==meId);
  editDraftTransfer = { id:uid(), from:meId, to:(other?other.id:meId), amount:'', note:'', _isNew:true };
  renderTransferForm();
}
function startEditTransfer(id){
  const t = (current.transfers||[]).find(x=>x.id===id); if(!t) return;
  editDraftTransfer = JSON.parse(JSON.stringify(t)); renderTransferForm();
}
function renderTransferForm(){
  const d = editDraftTransfer, m = current.members;
  const opts = sel => m.map(p=>`<option value="${p.id}" ${p.id===sel?'selected':''}>${esc(p.name)}</option>`).join('');
  $("#main").innerHTML = `
    <div class="card">
      <div class="sect-title">${d._isNew?'記一筆轉帳 / 還款':'編輯轉帳'}</div>
      <div class="faint" style="margin:-2px 2px 12px;">誰實際把錢轉給誰（例：事後還款）。分帳結果會自動扣掉這筆。</div>
      <label class="fld"><span>誰轉出（付錢）</span><select id="trFrom">${opts(d.from)}</select></label>
      <label class="fld"><span>轉給誰（收錢）</span><select id="trTo">${opts(d.to)}</select></label>
      <label class="fld"><span>金額</span>
        <input id="trAmt" type="number" inputmode="decimal" placeholder="0" value="${esc(d.amount)}"></label>
      <label class="fld"><span>備註（選填）</span><input id="trNote" placeholder="例如：6/20 用 LINE Pay 還" value="${esc(d.note||'')}"></label>
    </div>
    <div class="row">
      <button class="btn ghost" onclick="cancelDraft()">取消</button>
      <button class="btn" onclick="saveTransfer()">儲存</button>
    </div>
    ${d._isNew?'':'<div class="spacer"></div><button class="btn danger block" onclick="deleteTransfer()">刪除這筆</button>'}
  `;
}
function saveTransfer(){
  const d = editDraftTransfer;
  d.from = $("#trFrom").value; d.to = $("#trTo").value;
  d.amount = Number($("#trAmt").value)||0; d.note = ($("#trNote").value||'').trim();
  if(d.from===d.to){ toast('轉出和收款不能是同一人'); return; }
  if(d.amount<=0){ toast('金額要大於 0'); return; }
  const isNew = d._isNew; delete d._isNew;
  current.transfers = current.transfers || [];
  const i = current.transfers.findIndex(x=>x.id===d.id);
  if(i>=0) current.transfers[i]=d; else current.transfers.push(d);
  logHistory(`${isNew?'記一筆轉帳':'改轉帳'}：${_memName(d.from)}→${_memName(d.to)} ${money(d.amount)}`);
  editDraftTransfer=null; persistCurrent(); renderEdit(false);
}
async function deleteTransfer(){
  if(!await uiConfirm('刪除這筆轉帳紀錄？', {danger:true})) return;
  const d = editDraftTransfer;
  current.transfers = (current.transfers||[]).filter(x=>x.id!==d.id);
  logHistory(`刪除轉帳：${_memName(d.from)}→${_memName(d.to)} ${money(d.amount)}`);
  editDraftTransfer=null; persistCurrent(); renderEdit(false);
}

  const verify = r.allOk

      </div>` : ''}

        <div class="h">${(current.transfers&&current.transfers.length)?'還要喬（最少轉帳）':'最少轉帳'} ${r.transfers.length>0?`（${r.transfers.length} 筆）`:''}</div>
        ${transferRows}
      </div>

}

// settlement 兩段式：{ "from>to": {paid, confirmed} }；相容舊的字串陣列（視為已付+已確認）
function normSettle(s){
  const out = {};
  if(Array.isArray(s)){ for(const k of s){ if(typeof k==="string") out[k]={paid:true,confirmed:true}; } }
  else if(s && typeof s==="object"){ for(const k in s){ const v=s[k];
    if(v===true) out[k]={paid:true,confirmed:true};
    else if(v && typeof v==="object") out[k]={paid:!!v.paid, confirmed:!!v.confirmed}; } }
  return out;
}
function settleMap(){
  if(!current.settlements || typeof current.settlements!=="object" || Array.isArray(current.settlements))
    current.settlements = normSettle(current.settlements);
  return current.settlements;
}
// 結算標記全走後端 g_settle（驗身分、原子寫入）；current 用回傳值更新後重畫
async function toggleSettle(from, to){   // 付款方：標記/取消「已付」
  const map = settleMap(), k = from+">"+to;
  const op = (map[k] && map[k].paid) ? 'unmark_paid' : 'mark_paid';
  try{ current = await Store.settle(current.id, from, to, op); }
  catch(e){ console.error(e); return toast(_settleErr(e)); }
  broadcastChanged(current.id); renderResult();
}
async function toggleConfirm(from, to){  // 收款方：確認收到 / 取消確認
  const map = settleMap(), k = from+">"+to;
  if(!map[k] || !map[k].paid) return;
  const op = map[k].confirmed ? 'unconfirm' : 'confirm';
  try{ current = await Store.settle(current.id, from, to, op); }
  catch(e){ console.error(e); return toast(_settleErr(e)); }
  broadcastChanged(current.id); renderResult(); maybeMarkFastPay();
  if(isCurrentSettled()) toast("🎉 全部結清，這本收工啦！");
}
async function settleReceived(from, to){  // 收款方：未付狀態直接「我已收到」→ 已付＋已確認結清（付款人轉了沒更新時用）
  try{ current = await Store.settle(current.id, from, to, 'received'); }
  catch(e){ console.error(e); return toast(_settleErr(e)); }
  broadcastChanged(current.id); renderResult(); maybeMarkFastPay();
  if(isCurrentSettled()) toast("🎉 全部結清，這本收工啦！");
}
function _settleErr(e){ const m=String((e&&e.message)||''); if(m.includes('not allowed')) return '只有當事人能標記這筆'; if(m.includes('not paid')) return '對方還沒標記已付'; return '更新失敗，請重試'; }
// 目前帳本是否全部結清（最少轉帳都確認、或打平）
function isCurrentSettled(){
  if(!lastResult || !current) return false;
  const trs = lastResult.transfers||[];
  if(trs.length===0) return grandTotal(current.items, current.adjustments) > 0;
  const sm = normSettle(current.settlements);
  return trs.every(t=>{ const s=sm[t.from+">"+t.to]; return !!(s && s.confirmed); });
}
// 秒付俠：誰已把自己該付的全部付清(確認)；first-wins 記到帳本
function clearedDebtorUids(){
  if(!lastResult) return [];
  const trs = lastResult.transfers||[], sm = normSettle(current.settlements), out = [];
  for(const fid of [...new Set(trs.map(t=>t.from))]){
    const mine = trs.filter(t=>t.from===fid);
    if(mine.length && mine.every(t=>{ const s=sm[t.from+">"+t.to]; return !!(s && s.confirmed); })){
      const mem = current.members.find(x=>x.id===fid);
      if(mem && mem.uid) out.push(mem.uid);
    }
  }
  return out;
}
function maybeMarkFastPay(){
  if(!current || current.fastPayUid) return;
  const cl = clearedDebtorUids();
  if(cl.length){ current.fastPayUid = cl[0]; if(CLOUD && ACCESS_TOKEN) Store.setFastpay(current.id, cl[0]).catch(e=>console.error(e)); }
}
function remindReceipt(from, to, amount){   // 一鍵在 LINE 提醒收款人確認（使用者自己選對象送出）
  const fromN = (lastResult && lastResult.nameOf[from]) || "", toN = (lastResult && lastResult.nameOf[to]) || "";
  const link = current.slug ? `https://liff.line.me/${LIFF_ID}?g=${current.slug}` : "";
  const txt = `【${current.title||"欸，算一下！"}】${fromN} 已付給 ${toN} ${money(amount)}，請 ${toN} 確認收到${link?`\n${link}`:""}`;
  if(liffReady && inLineClient && liff.isApiAvailable && liff.isApiAvailable("shareTargetPicker")){
    const msg = link ? flexCard(`${fromN} 已付給 ${toN} ${money(amount)}`, `請 ${toN} 開啟確認收到`, link, "開啟確認") : {type:"text", text:txt};
    liff.shareTargetPicker([msg]).then(()=>toast("已開啟提醒")).catch(()=>toast("已取消"));
  } else if(navigator.share){ navigator.share({text:txt}).catch(()=>{}); }
  else if(navigator.clipboard?.writeText){ navigator.clipboard.writeText(txt).then(()=>toast("已複製提醒訊息，貼給對方")).catch(()=>fallbackCopy(txt)); }
  else fallbackCopy(txt);
}
function copyPay(memberId){
  const m = current.members.find(x=>x.id===memberId);
  const v = m && m.payInfo && m.payInfo.trim();
  if(!v) return;
  if(navigator.clipboard?.writeText) navigator.clipboard.writeText(v).then(()=>toast("已複製收款資訊")).catch(()=>fallbackCopy(v));
  else fallbackCopy(v);
}
// 複製文字：精簡＝只留標題 + 最少轉帳（誰付給誰、未付的附收款帳號方便轉）
function resultText(){
  const r = lastResult;
  const smap = normSettle(current.settlements);
  let s = `🧾 ${current.title||"欸，算一下！"}\n💸 ${(current.transfers&&current.transfers.length)?'還要喬（最少轉帳）':'最少轉帳'}\n`;
  if(r.transfers.length===0){
    s += `・${(current.transfers&&current.transfers.length)?'都喬平了，免再轉 🎉':'大家剛好打平，免轉帳 🎉'}`;
  } else for(const t of r.transfers){
    const st = smap[t.from+">"+t.to] || {};
    const toM = current.members.find(m=>m.id===t.to);
    const pay = (!st.paid && toM && toM.payInfo && toM.payInfo.trim());
    const payShort = pay ? toM.payInfo.trim().split(/\s+/)[0] : '';   // 只露銀行/方式名，完整帳號不進複製文字（在 App 內複製鈕拿）
    s += `・${r.nameOf[t.from]} → ${r.nameOf[t.to]}：${money(t.amount)}${payShort?`（收款：${payShort}）`:""}\n`;
  }
  return s.trim();
}

function copyText(){
  const txt = resultText();
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast("已複製，可貼到 LINE")).catch(()=>fallbackCopy(txt));
  } else fallbackCopy(txt);
}
function fallbackCopy(txt){
  const ta=document.createElement("textarea"); ta.value=txt; document.body.appendChild(ta);
  ta.select(); try{ document.execCommand("copy"); toast("已複製"); }catch(e){ toast("複製失敗，請手動選取"); }
  document.body.removeChild(ta);
}

function shareToLine(){
  const txt = resultText();
  if(liffReady && inLineClient && liff.isApiAvailable && liff.isApiAvailable("shareTargetPicker")){
    liff.shareTargetPicker([{type:"text", text:txt}])
      .then(()=>toast("已開啟分享"))
      .catch(err=>{ console.error(err); toast("分享取消或失敗"); });
  } else if(navigator.share){
    navigator.share({text:txt}).catch(()=>{});
  } else {
    copyText();
  }
}

      <img src="logo_icon.svg" alt="" style="width:56px;height:65px;">

      <div style="font-size:19px;font-weight:700;margin-top:6px;">${esc(g.title||"未命名帳本")}</div>
      <div class="faint" style="margin-top:4px;">${esc(g.date||"")} ・ ${(g.members||[]).length} 人 ・ 總額 ${money(tot)}</div>
      <div class="muted" style="margin-top:14px;">你被邀請加入這本帳本。加入後它會出現在你的帳本列表，你也能新增自己的支出。</div>
    </div>
    ${joinSection}
    <div class="spacer"></div>
    <button class="btn ghost block" onclick="declineJoin()">先不要</button>`;
}
async function acceptJoin(){
  if(!_invite) return;
  $("#main").innerHTML = loadingHTML("加入中…");
  try{ current = _invite.slug ? await Store.joinBySlug(_invite.slug) : await Store.join(_invite.id, _invite.token); }
  catch(e){ console.error(e); toast("加入失敗"); return renderList(); }
  finishJoin("加入了這本帳本");
}
async function claimMember(memberId){
  if(!_invite || !_invite.slug) return;
  $("#main").innerHTML = loadingHTML("認領中…");
  try{ current = await Store.claimBySlug(_invite.slug, memberId); }
  catch(e){
    console.error(e);
    if(String(e.message||"").includes("already claimed")){
      toast("這個名字已被認領了，換一個");
      try{ const fresh = await Store.getBySlug(_invite.slug); if(fresh) return showJoinPrompt(fresh, _invite.token); }catch(_){}
    } else toast("認領失敗");
    return renderList();
  }
  const cm = current.members.find(m=>m.id===memberId);
  finishJoin(`認領了名字「${cm?cm.name:''}」`);
}
function finishJoin(action){
  history.replaceState(null, "", location.pathname);   // 清掉邀請參數
  _invite = null;
  applyProfileToCurrent();
  if(action) logHistory(action);
  persistCurrent();
  subscribeRealtime(current.id);
  renderEdit(false);
}
function declineJoin(){ _invite=null; history.replaceState(null,"",location.pathname); renderList(); }

/* =========================================================================
 * 啟動：LINE 登入（必須）→ 邀請連結 #g&t（成員直接開／非成員問加入）→ 否則我的列表
 * ========================================================================= */
async function boot(){
  try{
    if(typeof liff==="undefined" || !LIFF_ID){ showLoginError("這個 app 需要在 LINE 內開啟"); return; }
    await liff.init({ liffId: LIFF_ID });
    inLineClient = liff.isInClient();
    if(!inLineClient){ showLoginError("「欸，算一下！」請在 LINE 內開啟使用"); return; }   // 只限 LINE 內
    if(!liff.isLoggedIn()){ liff.login(); return; }   // LINE 內若未登入，導向登入後返回
    liffReady = true;
    const prof = await liff.getProfile();
    MY_UID = prof.userId; MY_NAME = prof.displayName || "我"; MY_PIC = prof.pictureUrl || "";
    ACCESS_TOKEN = liff.getAccessToken();
    renderAvatar();
    await syncOrderFromCloud();
  }catch(e){ console.error("LIFF login failed:", e); showLoginError("LINE 登入失敗，請重開或在 LINE 內開啟"); return; }
  if(!ACCESS_TOKEN){ showLoginError("拿不到 LINE 登入資訊，請在 LINE 內開啟"); return; }

  const qp = new URLSearchParams(location.search || "");
  const hp = new URLSearchParams((location.hash||"").replace(/^#/,""));
  const gid = qp.get("g") || hp.get("g");
  const tok = qp.get("t") || hp.get("t");
  const by  = qp.get("by") || hp.get("by");   // 邀請歸因：誰揪我來的
  // 讀完參數立刻把網址清乾淨：網址列不再殘留 ?g=...，避免之後複製網址列誤把某帳本當「App 連結」分享出去
  if(location.search || location.hash) history.replaceState(null, "", location.pathname);
  if(by && by!==MY_UID){ try{ await Store.recordReferral(by); }catch(e){ console.error(e); } }
  try{ _myBadges = await Store.getBadges(); }catch(e){ console.error(e); }
  if(gid){
    $("#title").textContent = "載入中…";
    $("#main").innerHTML = loadingHTML("載入帳本中…");
    try{
      // 有 t → 舊式 id+token 連結；沒 t → 新式短連結（g 即 slug）
      const g = tok ? await Store.get(gid, tok) : await Store.getBySlug(gid);
      if(g){
        if((g.members||[]).some(m=>m.uid===MY_UID)){ current=g; if(applyProfileToCurrent()) persistCurrent(); subscribeRealtime(g.id); renderEdit(false); return; }
        showJoinPrompt(g, tok); return;
      }
    }catch(e){ console.error(e); }
    toast("連結無效或已被刪除");
  }
  renderList();
}
boot();
</script>
